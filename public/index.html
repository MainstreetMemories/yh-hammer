<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yellow Hammer Properties</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
    body { background: #1a1a2e; color: #fff; min-height: 100vh; padding: 20px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { color: #f4d03f; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 3px; }
    .header img { height: 80px; margin-bottom: 10px; }
    
    .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 30px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; }
    .btn-primary { background: #f4d03f; color: #1a1a2e; }
    .btn-primary:hover { background: #d4b12f; }
    .btn-secondary { background: #e74c3c; color: #fff; }
    .btn-secondary:hover { background: #c0392b; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-success:hover { background: #1e8449; }
    .btn-info { background: #3498db; color: #fff; }
    .btn-info:hover { background: #2980b9; }
    
    .panel { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: none; }
    .panel.active { display: block; }
    .panel h2 { color: #f4d03f; margin-bottom: 15px; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #aaa; }
    .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px; background: #0f3460; color: #fff; }
    .form-group input[type="file"] { background: #0f3460; }
    
    .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
    .job-card { background: #0f3460; padding: 15px; border-radius: 8px; border-left: 4px solid #f4d03f; }
    .job-card h3 { color: #f4d03f; margin-bottom: 10px; }
    .job-card p { margin: 5px 0; color: #ccc; }
    .job-card .actions { margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap; }
    .job-card .btn { padding: 8px 12px; font-size: 0.85rem; }
    
    .month-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .month-tab { padding: 8px 16px; background: #0f3460; border: none; border-radius: 6px; color: #fff; cursor: pointer; }
    .month-tab.active { background: #f4d03f; color: #1a1a2e; }
    
    .edit-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .edit-form .form-group { margin-bottom: 10px; }
    .edit-form .full-width { grid-column: 1 / -1; }
    
    #message { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; z-index: 1000; display: none; }
    #message.success { background: #27ae60; display: block; }
    #message.error { background: #e74c3c; display: block; }
  </style>
</head>
<body>
  <div class="header">
    <img src="/LOGO.png" alt="Logo">
    <h1>Yellow Hammer Properties</h1>
  </div>
  
  <div class="btn-group">
    <button class="btn btn-primary" onclick="showPanel('upload')">📤 Upload Contract</button>
    <button class="btn btn-success" onclick="showPanel('request')">📋 Request Estimate</button>
    <button class="btn btn-info" onclick="showPanel('add-estimate')">📝 Add Estimate</button>
    <button class="btn btn-info" onclick="showPanel('add-install')">📅 Add Install Date</button>
    <button class="btn btn-secondary" onclick="showPanel('jobs')">📋 View Jobs</button>
    <button class="btn btn-secondary" onclick="toggleEditRecords()">✏️ Edit Records</button>
  </div>

  <div id="message"></div>

  <!-- Upload Panel -->
  <div id="upload-panel" class="panel">
    <h2>📤 Upload Contract</h2>
    <div class="form-group">
      <label>Select Contract Image</label>
      <input type="file" id="contract-file" accept="image/*">
    </div>
    <button class="btn btn-primary" onclick="uploadContract()">Upload & Extract</button>
  </div>

  <!-- Request Estimate Panel -->
  <div id="request-panel" class="panel">
    <h2>📋 Request Estimate</h2>
    <p style="color:#aaa;margin-bottom:15px;">Select a job to request an estimate:</p>
    <div id="request-jobs"></div>
  </div>

  <!-- Add Estimate Panel -->
  <div id="add-estimate-panel" class="panel">
    <h2>📝 Add Estimate</h2>
    <div class="form-group">
      <label>Select Job</label>
      <select id="estimate-job-select" onchange="loadEstimateJob()">
        <option value="">-- Select Job --</option>
      </select>
    </div>
    <div class="form-group">
      <label>Estimate Date</label>
      <input type="date" id="estimate-date">
    </div>
    <div class="form-group">
      <label>Estimated Squares</label>
      <input type="text" id="estimate-squares" placeholder="e.g., 32">
    </div>
    <div class="form-group">
      <label>Contractor</label>
      <input type="text" id="estimate-contractor" placeholder="Contractor name">
    </div>
    <div class="form-group">
      <label>Paid Amount ($)</label>
      <input type="text" id="estimate-amount" placeholder="0.00">
    </div>
    <button class="btn btn-primary" onclick="addEstimate()">Save Estimate</button>
  </div>

  <!-- Add Install Date Panel -->
  <div id="add-install-panel" class="panel">
    <h2>📅 Add Install Date</h2>
    <div class="form-group">
      <label>Select Job</label>
      <select id="install-job-select" onchange="loadInstallJob()">
        <option value="">-- Select Job --</option>
      </select>
    </div>
    <div class="form-group">
      <label>Install Date</label>
      <input type="date" id="install-date">
    </div>
    <button class="btn btn-primary" onclick="addInstallDate()">Save Install Date</button>
  </div>

  <!-- View Jobs Panel -->
  <div id="jobs-panel" class="panel">
    <h2>📋 View All Jobs</h2>
    <div class="month-tabs" id="month-tabs"></div>
    <div id="jobs-list"></div>
  </div>

  <!-- Edit Records Panel -->
  <div id="edit-panel" class="panel">
    <h2>✏️ Edit Records</h2>
    <div class="form-group">
      <label>Select Job to Edit</label>
      <select id="edit-job-select" onchange="loadEditJob()">
        <option value="">-- Select Job --</option>
      </select>
    </div>
    <div id="edit-form" class="edit-form" style="display:none;">
      <!-- All 25 fields (A-Y + AA-AE) -->
      <div class="form-group"><label>Address (A)</label><input type="text" id="edit-A"></div>
      <div class="form-group"><label>Cert Of Comp (B)</label><input type="text" id="edit-B"></div>
      <div class="form-group"><label>Contract Date (C)</label><input type="text" id="edit-C"></div>
      <div class="form-group"><label>Estimate Date (D)</label><input type="text" id="edit-D"></div>
      <div class="form-group"><label>Install Date (E)</label><input type="text" id="edit-E"></div>
      <div class="form-group"><label>Owner (F)</label><input type="text" id="edit-F"></div>
      <div class="form-group"><label>Total Cost (G)</label><input type="text" id="edit-G"></div>
      <div class="form-group"><label>Req Down Pmt (H)</label><input type="text" id="edit-H"></div>
      <div class="form-group"><label>Finance Amt (I)</label><input type="text" id="edit-I"></div>
      <div class="form-group"><label>Add Expense (J)</label><input type="text" id="edit-J"></div>
      <div class="form-group"><label>Total Balance (K)</label><input type="text" id="edit-K"></div>
      <div class="form-group"><label>T.O.O.P (L)</label><input type="text" id="edit-L"></div>
      <div class="form-group"><label>DEP Amt Held (M)</label><input type="text" id="edit-M"></div>
      <div class="form-group"><label>Amount Due (N)</label><input type="text" id="edit-N"></div>
      <div class="form-group"><label>Pmnt Method (O)</label><input type="text" id="edit-O"></div>
      <div class="form-group"><label>Date Paid (Q)</label><input type="text" id="edit-Q"></div>
      <div class="form-group"><label>Check # (R)</label><input type="text" id="edit-R"></div>
      <div class="form-group"><label>Paid Amt (S)</label><input type="text" id="edit-S"></div>
      <div class="form-group"><label>Drip Edge (T)</label><input type="text" id="edit-T"></div>
      <div class="form-group"><label>Ventilation (U)</label><input type="text" id="edit-U"></div>
      <div class="form-group"><label>Manufacturer (V)</label><input type="text" id="edit-V"></div>
      <div class="form-group"><label>Shingle Type (W)</label><input type="text" id="edit-W"></div>
      <div class="form-group"><label>Shingle Color (X)</label><input type="text" id="edit-X"></div>
      <div class="form-group"><label>Est Squares (Y)</label><input type="text" id="edit-Y"></div>
      <div class="form-group"><label>Notes (Z)</label><input type="text" id="edit-Z"></div>
      <div class="form-group"><label>Permit Cost (AA)</label><input type="text" id="edit-AA"></div>
      <button class="btn btn-success full-width" onclick="saveEditJob()">💾 Save Changes</button>
    </div>
  </div>

  <script>
    let allJobs = {};
    let currentEditMonth = '';

    function showPanel(id) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById(id + '-panel').classList.add('active');
      if (id === 'jobs' || id === 'request' || id === 'add-estimate' || id === 'add-install' || id === 'edit') loadJobs();
    }

    function toggleEditRecords() {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('edit-panel').classList.add('active');
      loadJobs();
    }

    async function loadJobs() {
      const res = await fetch('/api/jobs');
      allJobs = await res.json();
      
      const months = Object.keys(allJobs).sort((a, b) => {
        const order = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        return order.indexOf(a) - order.indexOf(b);
      });
      
      // Populate all selects
      const selects = ['estimate-job-select', 'install-job-select', 'edit-job-select', 'request-jobs'];
      selects.forEach(s => {
        const el = document.getElementById(s);
        if (el && s !== 'request-jobs') {
          el.innerHTML = '<option value="">-- Select Job --</option>';
        }
      });
      
      let allJobsList = [];
      months.forEach(month => {
        allJobs[month].forEach(job => {
          if (job.address) {
            const opt = { month, row: job.row, address: job.address, owner: job.owner };
            allJobsList.push(opt);
            ['estimate-job-select', 'install-job-select', 'edit-job-select'].forEach(sid => {
              const sel = document.getElementById(sid);
              if (sel) {
                const o = document.createElement('option');
                o.value = JSON.stringify(opt);
                o.text = `${job.address} - ${job.owner}`;
                sel.appendChild(o);
              }
            });
          }
        });
      });
      
      // Request jobs as cards
      const reqDiv = document.getElementById('request-jobs');
      if (reqDiv) {
        reqDiv.innerHTML = allJobsList.length ? '' : '<p>No jobs found</p>';
        allJobsList.forEach(j => {
          const card = document.createElement('div');
          card.className = 'job-card';
          card.style.marginBottom = '10px';
          card.innerHTML = `<p><strong>${j.address}</strong></p><p>${j.owner}</p><button class="btn btn-success" onclick='requestEstimate(${JSON.stringify(j)})'>Request</button>`;
          reqDiv.appendChild(card);
        });
      }
      
      // Month tabs for View Jobs
      const tabsDiv = document.getElementById('month-tabs');
      if (tabsDiv) {
        tabsDiv.innerHTML = months.map(m => `<button class="month-tab ${m === 'April' ? 'active' : ''}" onclick="showMonth('${m}')">${m}</button>`).join('');
        showMonth('April');
      }
    }

    function showMonth(month) {
      document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      const list = document.getElementById('jobs-list');
      const jobs = allJobs[month] || [];
      list.innerHTML = jobs.length ? '' : '<p>No jobs this month</p>';
      
      jobs.forEach(job => {
        if (job.address) {
          const card = document.createElement('div');
          card.className = 'job-card';
          card.innerHTML = `
            <h3>${job.address}</h3>
            <p><strong>Owner:</strong> ${job.owner}</p>
            <p><strong>Phone:</strong> ${job.phone}</p>
            <p><strong>Total:</strong> $${job.totalCost}</p>
            <p><strong>T.O.O.P:</strong> $${job.tooop}</p>
            <div class="actions">
              <button class="btn btn-success" onclick='requestEstimate(${JSON.stringify({month, row:job.row, address:job.address, owner:job.owner})})'>Request Est</button>
              <button class="btn btn-info" onclick='selectForEstimate(${JSON.stringify({month, row:job.row, address:job.address, owner:job.owner})})'>Add Est</button>
              <button class="btn btn-info" onclick='selectForInstall(${JSON.stringify({month, row:job.row, address:job.address, owner:job.owner})})'>Add Install</button>
              <button class="btn btn-secondary" onclick='selectForEdit(${JSON.stringify({month, row:job.row, address:job.address, owner:job.owner})})'>Edit</button>
            </div>`;
          list.appendChild(card);
        }
      });
    }

    async function uploadContract() {
      const file = document.getElementById('contract-file').files[0];
      if (!file) return showMessage('Please select a file', 'error');
      
      showMessage('Processing...', 'success');
      const formData = new FormData();
      formData.append('file', file);
      
      const res = await fetch('/api/upload', { method: 'POST', body: formData });
      const data = await res.json();
      
      if (data.error) {
        showMessage(data.error, 'error');
      } else {
        showMessage(`Saved to ${data.month} for ${data.owner}`, 'success');
        document.getElementById('contract-file').value = '';
      }
    }

    async function requestEstimate(job) {
      const res = await fetch('/api/request-estimate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(job)
      });
      showMessage('Estimate requested!', 'success');
    }

    function selectForEstimate(job) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('add-estimate-panel').classList.add('active');
      document.querySelectorAll('#estimate-job-select option').forEach(o => {
        if (o.value && JSON.parse(o.value).row === job.row && JSON.parse(o.value).month === job.month) o.selected = true;
      });
      loadEstimateJob();
    }

    function selectForInstall(job) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('add-install-panel').classList.add('active');
      document.querySelectorAll('#install-job-select option').forEach(o => {
        if (o.value && JSON.parse(o.value).row === job.row && JSON.parse(o.value).month === job.month) o.selected = true;
      });
      loadInstallJob();
    }

    function selectForEdit(job) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('edit-panel').classList.add('active');
      document.querySelectorAll('#edit-job-select option').forEach(o => {
        if (o.value && JSON.parse(o.value).row === job.row && JSON.parse(o.value).month === job.month) o.selected = true;
      });
      loadEditJob();
    }

    async function loadEstimateJob() {
      const sel = document.getElementById('estimate-job-select');
      if (!sel.value) return;
      const job = JSON.parse(sel.value);
      document.getElementById('estimate-date').value = new Date().toISOString().split('T')[0];
    }

    async function addEstimate() {
      const sel = document.getElementById('estimate-job-select');
      if (!sel.value) return showMessage('Select a job first', 'error');
      const job = JSON.parse(sel.value);
      
      await fetch('/api/add-estimate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          month: job.month,
          row: job.row,
          date: document.getElementById('estimate-date').value,
          squares: document.getElementById('estimate-squares').value,
          contractor: document.getElementById('estimate-contractor').value,
          amount: document.getElementById('estimate-amount').value
        })
      });
      showMessage('Estimate added!', 'success');
    }

    async function loadInstallJob() {
      const sel = document.getElementById('install-job-select');
      if (!sel.value) return;
      const job = JSON.parse(sel.value);
      document.getElementById('install-date').value = new Date().toISOString().split('T')[0];
    }

    async function addInstallDate() {
      const sel = document.getElementById('install-job-select');
      if (!sel.value) return showMessage('Select a job first', 'error');
      const job = JSON.parse(sel.value);
      
      await fetch('/api/add-install', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          month: job.month,
          row: job.row,
          installDate: document.getElementById('install-date').value
        })
      });
      showMessage('Install date added!', 'success');
    }

    async function loadEditJob() {
      const sel = document.getElementById('edit-job-select');
      if (!sel.value) return;
      const job = JSON.parse(sel.value);
      currentEditMonth = job.month;
      
      const res = await fetch(`/api/job/${job.month}/${job.row}`);
      const data = await res.json();
      
      document.getElementById('edit-form').style.display = 'grid';
      const fields = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','Q','R','S','T','U','V','W','X','Y','Z','AA'];
      fields.forEach((f, i) => {
        const el = document.getElementById('edit-' + f);
        if (el) el.value = data.data[i] || '';
      });
    }

    async function saveEditJob() {
      const sel = document.getElementById('edit-job-select');
      if (!sel.value) return showMessage('Select a job first', 'error');
      const job = JSON.parse(sel.value);
      
      const fields = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','Q','R','S','T','U','V','W','X','Y','Z','AA'];
      const data = fields.map(f => document.getElementById('edit-' + f).value);
      
      await fetch('/api/update-job', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ month: job.month, row: job.row, data })
      });
      showMessage('Job updated!', 'success');
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = type;
      setTimeout(() => msg.className = '', 3000);
    }
  </script>
</body>
</html>
