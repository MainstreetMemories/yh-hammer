<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yellow Hammer Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- PDF.js for converting scanned PDFs to images -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <style>
    body { background: #1a1a2e; color: #fff; font-family: system-ui, sans-serif; }
    .glass { background: #16213e; }
    .btn-primary { background: #f4d03f; color: #1a1a2e; }
    .btn-primary:hover { background: #d4b12f; }
    .btn-secondary { background: #e74c3c; color: #fff; }
    .btn-success { background: #27ae60; color: #fff; }
  </style>
</head>
<body class="p-6">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-center text-yellow-500 mb-8">Yellow Hammer Properties</h1>
    
    <div id="menu" class="space-y-4">
      <button onclick="handleUpload()" class="btn-primary w-full py-4 rounded-xl font-bold text-xl">
        📷 Upload Contract
      </button>
      
      <button onclick="alert('Select a job first')" class="btn-secondary w-full py-3 rounded-xl font-bold">
        📋 Request Estimate
      </button>
    </div>
    
    <div id="progress" class="hidden mt-6 text-center">
      <p class="text-white" id="progress-text">Processing...</p>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    
    function handleUpload() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*,.pdf';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        showProgress('Reading file...');
        
        let imageData;
        const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
        
        if (isPdf) {
          showProgress('Converting PDF to image...');
          imageData = await convertPdfToImages(file);
        } else {
          imageData = await readFile(file);
        }
        
        showProgress('Extracting data with AI...');
        
        try {
          const response = await fetch(API + '/api/extract-data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file: imageData, isPdf: isPdf })
          });
          
          const result = await response.json();
          
          if (result.error) {
            alert('Error: ' + result.error);
            hideProgress();
          } else if (result.success && result.data) {
            showConfirmation(result.data);
          } else {
            alert('No data extracted - try a clearer image');
            hideProgress();
          }
        } catch (err) {
          alert('AI DATA FAILED: ' + err.message);
          hideProgress();
        }
      };
      input.click();
    }
    
    // Convert PDF to images using PDF.js
    async function convertPdfToImages(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
      
      // Convert first 2 pages to image
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 2 });
      
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const context = canvas.getContext('2d');
      
      await page.render({ canvasContext: context, viewport: viewport }).promise;
      
      return canvas.toDataURL('image/jpeg').split(',')[1];
    }
    
    function readFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    
    function showConfirmation(data) {
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      const currentMonth = new Date().toLocaleString('default', { month: 'long' });
      
      let html = '<div class="glass rounded-xl p-4">';
      html += '<h3 class="text-yellow-500 font-bold text-lg mb-3">Confirm Data</h3>';
      html += '<div class="mb-3"><label class="text-gray-400 text-sm">Month:</label>';
      html += '<select id="month" class="w-full bg-gray-800 text-white px-2 py-1 rounded">';
      months.forEach(m => html += '<option value="' + m + '"' + (m === currentMonth ? ' selected' : '') + '>' + m + '</option>');
      html += '</select></div>';
      
      const fields = ['owner','address','phone','email','totalCost','toooP','contractDate','manufacturer','shingleType','shingleColor'];
      fields.forEach(f => {
        html += '<div class="mb-2"><label class="text-gray-400 text-sm">' + f + ':</label>';
        html += '<input id="' + f + '" value="' + (data[f] || '') + '" class="w-full bg-gray-800 text-white px-2 py-1 rounded"></div>';
      });
      
      html += '<button onclick="saveData()" class="btn-success w-full py-2 mt-4 rounded">💾 Save</button>';
      html += '<button onclick="location.reload()" class="btn-secondary w-full py-2 mt-2 rounded">Cancel</button>';
      html += '</div>';
      
      document.getElementById('menu').innerHTML = html;
    }
    
    async function saveData() {
      const data = {
        month: document.getElementById('month').value,
        owner: document.getElementById('owner').value,
        address: document.getElementById('address').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        totalCost: document.getElementById('totalCost').value,
        toooP: document.getElementById('toooP').value,
        contractDate: document.getElementById('contractDate').value,
        manufacturer: document.getElementById('manufacturer').value,
        shingleType: document.getElementById('shingleType').value,
        shingleColor: document.getElementById('shingleColor').value,
        ventilationColor: '',
        dripEdgeColor: '',
        notes: ''
      };
      
      showProgress('Saving...');
      
      const response = await fetch(API + '/api/save-extracted', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      
      const result = await response.json();
      
      if (result.success) {
        alert('✅ Saved to ' + data.month + ' for ' + data.owner);
        location.reload();
      } else {
        alert('Error: ' + (result.error || 'Failed'));
        hideProgress();
      }
    }
    
    function showProgress(text) {
      document.getElementById('progress').classList.remove('hidden');
      document.getElementById('progress-text').textContent = text;
    }
    
    function hideProgress() {
      document.getElementById('progress').classList.add('hidden');
    }
  </script>
</body>
</html>
