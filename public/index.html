<!DOCTYPE html>
<html>
<head>
  <title>Yellow Hammer Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body class="bg-neutral-900 text-white p-8">
  <h1 class="text-4xl text-yellow-500 font-bold mb-8">Yellow Hammer Properties</h1>
  
  <div id="menu" class="grid gap-4 max-w-md">
    <button onclick="uploadClick()" class="bg-yellow-500 text-black font-bold py-4 px-6 rounded">📷 Upload Contract</button>
    <button onclick="requestEstimate()" class="bg-orange-500 text-white font-bold py-4 px-6 rounded">📧 Request Estimate</button>
    <button onclick="addEstimate()" class="bg-green-500 text-white font-bold py-4 px-6 rounded">📋 Add Estimate</button>
    <button onclick="viewJobs()" class="bg-blue-500 text-white font-bold py-4 px-6 rounded">📋 View Jobs</button>
  </div>

  <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFile(this)" class="hidden">

  <div id="confirm" class="hidden mt-8 p-4 bg-gray-800 rounded">
    <h2 class="text-yellow-500 text-xl font-bold mb-4">Confirm Data</h2>
    <div id="fields" class="space-y-2"></div>
    <button onclick="saveData()" class="bg-yellow-500 text-black font-bold py-2 px-4 rounded mt-4">Save</button>
    <button onclick="showMenu()" class="bg-red-500 text-white font-bold py-2 px-4 rounded mt-4">Cancel</button>
  </div>

  <div id="progress" class="hidden mt-8">
    <p class="text-yellow-500">Processing...</p>
  </div>

  <script>
    const API = window.location.origin;
    let data = {};

    function uploadClick() { 
      document.getElementById('fileInput').click(); 
    }
    
    async function handleFile(input) {
      if (!input.files[0]) return;
      
      const file = input.files[0];
      alert('Processing: ' + file.name);
      document.getElementById('progress').classList.remove('hidden');
      
      try {
        let imageBase64;
        
        // Check file type
        if (file.type === 'application/pdf') {
          // Convert PDF to images (both pages)
          const images = await convertPdfToImages(file);
          imageBase64 = images.join('||PAGE||');
        } else {
          // It's already an image
          imageBase64 = await fileToBase64(file);
        }
        
        // Send to server
        const response = await fetch(API + '/api/upload-json', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({file: imageBase64, isPdf: true, preview: true})
        });
        
        const result = await response.json();
        alert(result.success ? 'Success!' : 'Error: ' + result.error);
        document.getElementById('progress').classList.add('hidden');
        
        if (result.previewData) {
          data = result.previewData;
          showConfirm(result.previewData);
        }
      } catch (err) {
        alert('Error: ' + err.message);
        document.getElementById('progress').classList.add('hidden');
      }
    }
    
    // Convert PDF file to array of base64 images (both pages)
    async function convertPdfToImages(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const images = [];
      
      // Convert each page to image
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 2 }); // Higher scale = better quality
        
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        
        // Convert to base64
        const imageData = canvas.toDataURL('image/jpeg').split(',')[1];
        images.push(imageData);
      }
      
      return images;
    }
    
    // Convert file to base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function showConfirm(d) {
      document.getElementById('menu').classList.add('hidden');
      const fields = ['owner','address','phone','email','totalCost','toooP'];
      let html = fields.map(f => 
        '<div><label class="text-gray-400">'+f+':</label><input id="'+f+'" value="'+(d[f]||'')+'" class="bg-gray-700 p-2 w-full rounded"></div>'
      ).join('');
      document.getElementById('fields').innerHTML = html;
      document.getElementById('confirm').classList.remove('hidden');
    }

    function saveData() {
      alert('Saving to spreadsheet...');
      const fields = ['owner','address','phone','email','totalCost','toooP'];
      fields.forEach(f => data[f] = document.getElementById(f).value);
      data.month = 'April';
      
      fetch(API + '/api/save-extracted', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).then(r => r.json()).then(result => {
        alert(result.success ? '✓ Saved!' : 'Error: ' + result.error);
        showMenu();
      }).catch(err => alert('Save error: ' + err.message));
    }

    function showMenu() {
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('confirm').classList.add('hidden');
    }

    function requestEstimate() { alert('Request Estimate'); }
    function addEstimate() { alert('Add Estimate'); }
    function viewJobs() { 
      fetch(API + '/api/jobs').then(r => r.json()).then(j => {
        alert('Jobs: ' + Object.keys(j).join(', '));
      }).catch(e => alert('Error: ' + e.message));
    }
  </script>
</body>
</html>
