    function isPdfFile(file) {

    async function convertPdfToImages(file, scale = 1.5) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const images = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        images.push(canvas.toDataURL('image/jpeg').split(',')[1]);
      }
      return images;
    }

      pendingData.notes = document.getElementById('edit-notes').value;
      
      // Recalculate month based on edited date
      const dateValue = pendingData.date.toLowerCase();
      const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
      let newMonth = 'April';
      for (let i = 0; i < months.length; i++) {
        if (dateValue.includes(months[i])) {
          newMonth = months[i].charAt(0).toUpperCase() + months[i].slice(1);
          break;
        }
      }
      // Check for month numbers like "2-28-26"
      const monthMatch = pendingData.date.match(/^(\d{1,2})/);
      if (monthMatch) {
        const m = parseInt(monthMatch[1]);
        if (m >= 1 && m <= 12) {
          newMonth = ['January','February','March','April','May','June','July','August','September','October','November','December'][m - 1];
        }
      }
      pendingData.month = newMonth;
      
      showProgress(true, 'Saving...');
      try {
        const response = await fetch(API + '/api/save-confirmed', {
          method: 'POST',

        } else {

        }
      } catch (err) {
        showStatus('Error: ' + err.message, true);
      }
      showProgress(false);
      showMenu();
    }

    async function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      document.getElementById('progress').className = 'mt-6';
      document.getElementById('progress-text').textContent = 'Reading...';
      
      const reader = new FileReader();
      reader.readAsDataURL(file);
      
      reader.onload = async function() {
        const imageData = reader.result.split(',')[1];
        document.getElementById('progress-text').textContent = 'Processing...';
        
        const response = await fetch(API + '/api/upload-json', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file: imageData, isPdf: false })
        });
        
        const result = await response.json();
        document.getElementById('progress').className = 'hidden';
        
        if (result.success && result.previewData) {
          pendingData = result.previewData;
          // Build preview

          });

      input.onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;
let imageData;
        if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
const images = await convertPdfToImages(file);
          imageData = images.join('||PAGE||');
        } else {
imageData = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
        }
const response = await fetch(API + '/api/upload-json', {
