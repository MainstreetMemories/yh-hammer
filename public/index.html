<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yellow Hammer Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Outfit', sans-serif; }
    body { background: #0a0a0a; background-image: radial-gradient(ellipse at 20% 0%, rgba(234, 179, 8, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, rgba(234, 179, 8, 0.1) 0%, transparent 50%); min-height: 100vh; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
    .btn-primary { background: linear-gradient(135deg, #eab308 0%, #ca8a04 50%, #a16207 100%); box-shadow: 0 4px 20px rgba(234, 179, 8, 0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(234, 179, 8, 0.4); }
    .btn-secondary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3); }
    .btn-secondary:hover { transform: translateY(-2px); }
    .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
    .logo-glow { filter: drop-shadow(0 0 20px rgba(234, 179, 8, 0.4)); }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(234, 179, 8, 0.3); }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .animate-float { animation: float 3s ease-in-out infinite; }
  </style>
</head>
<body class="bg-neutral-950 min-h-screen">
  <div class="relative py-8 px-4 text-center">
    <div class="relative inline-block animate-float">
      <img src="LOGO.png" alt="Yellow Hammer Properties" class="h-28 mx-auto mb-3 logo-glow" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <div class="text-5xl font-black tracking-tight" style="display:none;"><span class="text-yellow-500">YELLOW</span><span class="text-white">HAMMER</span></div>
      <div class="text-yellow-500 text-sm font-semibold tracking-[0.4em] mt-2 uppercase">Properties, Inc.</div>
    </div>
  </div>

  <div class="max-w-md mx-auto px-4 pb-8">
    <div id="status" class="hidden mb-4 p-4 rounded-2xl text-center font-semibold"></div>

    <!-- Confirm Dialog -->
    <div id="confirm-dialog" class="hidden glass rounded-2xl p-6 mb-4">
      <h3 class="text-yellow-500 font-bold text-lg mb-4">Confirm & Edit Data</h3>
      <div id="confirm-fields" class="space-y-2 max-h-96 overflow-y-auto"></div>
      <div class="flex gap-3 mt-4">
        <button onclick="confirmSave()" class="btn-primary flex-1 py-3 px-4 rounded-xl text-white font-bold">Save to Spreadsheet</button>
        <button onclick="cancelSave()" class="btn-danger flex-1 py-3 px-4 rounded-xl text-white font-bold">Cancel</button>
      </div>
    </div>

    <!-- Estimate Dialog -->
    <div id="estimate-dialog" class="hidden glass rounded-2xl p-6 mb-4">
      <button onclick="showMenu()" class="mb-3 text-yellow-500 font-semibold">← Back</button>
      <h2 id="estimate-title" class="text-white text-xl font-bold mb-4">Add Estimate</h2>
      <div id="estimate-month-select" class="mb-4"></div>
      <div id="estimate-job-select" class="mb-4"></div>
      <div id="estimate-fields" class="hidden space-y-3">
        <div><label class="text-gray-400 text-sm">Estimate Date:</label><input type="date" id="edit-estimateDate" class="w-full bg-gray-800 text-white px-3 py-2 rounded-lg"></div>
        <div><label class="text-gray-400 text-sm">Est. Squares:</label><input type="text" id="edit-squares" class="w-full bg-gray-800 text-white px-3 py-2 rounded-lg"></div>
        <div><label class="text-gray-400 text-sm">Contractor:</label><select id="edit-contractor" class="w-full bg-gray-800 text-white px-3 py-2 rounded-lg"></select></div>
        <div><label class="text-gray-400 text-sm">Est. Amount:</label><input type="text" id="edit-paid" class="w-full bg-gray-800 text-white px-3 py-2 rounded-lg"></div>
        <button onclick="saveEstimate()" class="btn-primary w-full py-3 rounded-xl text-white font-bold mt-4">Save Estimate</button>
      </div>
    </div>

    <div id="menu" class="grid gap-5 mt-2">
      <button onclick="alert('Upload button clicked!'); document.getElementById('file-input').click()" class="btn-primary group relative overflow-hidden py-7 px-5 rounded-3xl text-white font-bold text-xl shadow-2xl flex items-center justify-center gap-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0016.07 6H17a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        <span>Upload Contract</span>
      </button>
      <input type="file" id="file-input" accept="image/*,.pdf" class="hidden" onchange="handleFile(event)">
      
      <button onclick="alert('Request Estimate clicked!'); showRequestEstimate()" class="btn-yellow group relative overflow-hidden py-7 px-5 rounded-3xl text-white font-bold text-xl shadow-2xl flex items-center justify-center gap-4" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
        <span>Request Estimate</span>
      </button>
      <button onclick="showEstimateModal()" class="btn-green group relative overflow-hidden py-7 px-5 rounded-3xl text-white font-bold text-xl shadow-2xl flex items-center justify-center gap-4" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
        <span>Add Estimate</span>
      </button>
      
      <button onclick="showRequestInstall()" class="btn-yellow group relative overflow-hidden py-7 px-5 rounded-3xl text-white font-bold text-xl shadow-2xl flex items-center justify-center gap-4" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        <span>Request Install Date</span>
      </button>
      <button onclick="showInstallDateModal()" class="btn-blue group relative overflow-hidden py-7 px-5 rounded-3xl text-white font-bold text-xl shadow-2xl flex items-center justify-center gap-4" style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
        <span>Add Install Date</span>
      </button>
      
      <button onclick="showJobs()" class="btn-secondary group relative overflow-hidden py-7 px-5 rounded-3xl text-white font-bold text-xl shadow-2xl flex items-center justify-center gap-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
        <span>View Jobs</span>
      </button>
    </div>

    <div id="jobs" class="hidden">
      <button onclick="showMenu()" class="mb-5 text-yellow-500 font-semibold flex items-center gap-2">← Back</button>
      <h2 class="text-white text-2xl font-bold mb-5">Job Records</h2>
      <div id="month-tabs" class="flex flex-wrap gap-2 mb-5"></div>
      <div id="jobs-list" class="space-y-3"></div>
    </div>

    <div id="progress" class="hidden mt-6">
      <div class="glass rounded-2xl p-8 text-center">
        <div class="animate-spin h-12 w-12 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto mb-4"></div>
        <p class="text-yellow-500 font-semibold text-lg" id="progress-text">Processing...</p>
      </div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const API = window.location.origin;
    let pendingData = null;
    let window.jobs = {};

    // All fields for editing
    const ALL_FIELDS = [
      { key: 'address', label: 'Address' },
      { key: 'certOfComp', label: 'Cert Of Comp' },
      { key: 'contractDate', label: 'Contract Date' },
      { key: 'estimateDate', label: 'Estimate Date' },
      { key: 'installDate', label: 'Install Date' },
      { key: 'owner', label: 'Owner' },
      { key: 'totalCost', label: 'Total Cost' },
      { key: 'requiredDownPayment', label: 'Down Payment' },
      { key: 'financeAmount', label: 'Finance Amount' },
      { key: 'additionalExpense', label: 'Add Expense' },
      { key: 'totalBalanceDue', label: 'Balance Due' },
      { key: 'toooP', label: 'T.O.O.P' },
      { key: 'depAmtHeld', label: 'DEP Held' },
      { key: 'amountDue', label: 'Amount Due' },
      { key: 'pmntMethod', label: 'Pmnt Method' },
      { key: 'phone', label: 'Phone' },
      { key: 'email', label: 'Email' },
      { key: 'datePaid', label: 'Date Paid' },
      { key: 'checkNum', label: 'Check #' },
      { key: 'amountPaid', label: 'Amount Paid' },
      { key: 'dripEdgeColor', label: 'Drip Edge' },
      { key: 'ventilationColor', label: 'Ventilation' },
      { key: 'manufacturer', label: 'Manufacturer' },
      { key: 'shingleType', label: 'Shingle Type' },
      { key: 'shingleColor', label: 'Shingle Color' },
      { key: 'estimatedSquares', label: 'Squares' },
      { key: 'notes', label: 'Notes' }
    ];

    function showStatus(msg, err = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `mb-5 p-5 rounded-2xl text-center font-semibold ${err ? 'bg-red-500/20 text-red-300' : 'bg-green-500/20 text-green-300'}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 7000);
    }

    function showProgress(show, text = 'Processing...') {
      document.getElementById('progress').className = show ? 'mt-6' : 'hidden';
      document.getElementById('progress-text').textContent = text;
    }

    function showMenu() {
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('jobs').classList.add('hidden');
      document.getElementById('confirm-dialog').classList.add('hidden');
      document.getElementById('estimate-dialog').classList.add('hidden');
      document.getElementById('estimate-fields').classList.add('hidden');
      pendingData = null;
    }

    async function showJobs() {
      showProgress(true, 'Loading jobs...');
      try {
        const response = await fetch(API + '/api/jobs');
        window.jobs = await response.json();
        const months = Object.keys(window.jobs);
        const current = months.includes('April') ? 'April' : months[0];
        
        document.getElementById('month-tabs').innerHTML = months.map(m => 
          `<button onclick="showMonth('${m}')" class="px-5 py-2.5 rounded-xl font-semibold text-sm ${m === current ? 'bg-yellow-500 text-black' : 'bg-white/5 text-gray-400'}">${m}</button>`
        ).join('');
        
        showMonth(current);
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('jobs').classList.remove('hidden');
      } catch(err) {
        showStatus('Error loading jobs: ' + err.message, true);
      }
      showProgress(false);
    }

    function showMonth(month) {
      document.querySelectorAll('#month-tabs button').forEach(btn => {
        btn.className = btn.textContent === month 
          ? 'px-5 py-2.5 rounded-xl font-semibold text-sm bg-yellow-500 text-black'
          : 'px-5 py-2.5 rounded-xl font-semibold text-sm bg-white/5 text-gray-400';
      });
      
      const monthJobs = window.jobs[month] || [];
      const list = document.getElementById('jobs-list');
      if (monthJobs.length === 0) {
        list.innerHTML = '<p class="text-gray-500">No jobs this month</p>';
        return;
      }
      
      list.innerHTML = monthJobs.map(j => `
        <div class="glass rounded-xl p-4 card-hover flex justify-between items-center">
          <div class="flex-1">
            <div class="text-white font-bold">${j.owner || 'Unknown'}</div>
            <div class="text-gray-500 text-sm">${j.address || 'No address'}</div>
            <div class="text-yellow-500 font-bold">${j.totalCost || '0'}</div>
          </div>
          <button onclick="editJob('${month}', ${j.row})" class="bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-bold">Edit</button>
        </div>
      `).join('');
    }

    async function editJob(month, row) {
      showProgress(true, 'Loading...');
      try {
        const response = await fetch(API + '/api/get-job?month=' + month + '&row=' + row);
        const job = await response.json();
        if (job) {
          pendingData = { ...job, month: month, row: row };
          showConfirmDialog(job);
          document.getElementById('confirm-dialog').classList.remove('hidden');
          document.getElementById('jobs').classList.add('hidden');
        }
      } catch(err) {
        showStatus('Error: ' + err.message, true);
      }
      showProgress(false);
    }

    function showConfirmDialog(data) {
      let html = ALL_FIELDS.map(f => `
        <div class="flex items-center gap-2">
          <label class="text-gray-400 w-28 text-sm">${f.label}:</label>
          <input type="text" id="edit-${f.key}" value="${data[f.key] || ''}" class="flex-1 bg-gray-800 text-white px-2 py-1 rounded text-sm">
        </div>
      `).join('');
      document.getElementById('confirm-fields').innerHTML = html;
    }

    async function confirmSave() {
      if (!pendingData) return;
      
      // Update pendingData with edited values
      ALL_FIELDS.forEach(f => {
        const el = document.getElementById('edit-' + f.key);
        if (el) pendingData[f.key] = el.value;
      });
      
      showProgress(true, 'Saving...');
      try {
        const response = await fetch(API + '/api/save-confirmed', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(pendingData)
        });
        const result = await response.json();
        if (result.success) {
          showStatus('Saved to ' + result.month);
        } else {
          showStatus(result.error || 'Error saving', true);
        }
      } catch (err) {
        showStatus('Error: ' + err.message, true);
      }
      showProgress(false);
      showMenu();
    }

    function cancelSave() {
      showStatus('Cancelled');
      showMenu();
    }

    // ========== UPLOAD CONTRACT ==========
    function isPdfFile(file) {
      const type = (file.type || '').toLowerCase();
      const name = (file.name || '').toLowerCase();
      return type === 'application/pdf' || name.endsWith('.pdf');
    }

    async function convertPdfToImages(file, scale = 2) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const images = [];
      
      // Convert ALL pages
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        images.push(canvas.toDataURL('image/jpeg').split(',')[1]);
      }
      return images;
    }

    async function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      showProgress(true, 'Reading contract...');
      
      try {
        let imageData;
        
        if (isPdfFile(file)) {
          showProgress(true, 'Converting PDF pages...');
          imageData = (await convertPdfToImages(file)).join('||PAGE||');
        } else {
          imageData = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
            reader.readAsDataURL(file);
          });
        }

        showProgress(true, 'Extracting data with AI...');
        
        const response = await fetch(API + '/api/extract-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ file: imageData, isPdf: isPdfFile(file) })
        });
        
        const result = await response.json();
        
        if (result.success && result.data) {
          showProgress(false);
          pendingData = result.data;
          showConfirmDialog(result.data);
          document.getElementById('confirm-dialog').classList.remove('hidden');
          document.getElementById('menu').classList.add('hidden');
        } else {
          showStatus(result.error || 'Error extracting data', true);
          showProgress(false);
        }
      } catch (err) {
        showStatus('Error: ' + err.message, true);
        showProgress(false);
      }
      
      event.target.value = '';
    }

    // ========== REQUEST ESTIMATE ==========
    async function showRequestEstimate() {
      alert('showRequestEstimate started');
      await loadJobsIfNeeded();
      alert('Jobs loaded: ' + JSON.stringify(window.jobs));
      const months = Object.keys(window.jobs || {});
      if (months.length === 0) { alert('No jobs found'); return; }
      
      let html = '<p class="text-gray-400 mb-2">Select Month:</p><div class="flex flex-wrap gap-2">';
      html += months.map(m => `<button onclick="showRequestEstimateJobs('${m}')" class="px-3 py-1 bg-gray-700 text-white rounded">${m}</button>`).join('');
      html += '</div>';
      
      document.getElementById('estimate-month-select').innerHTML = html;
      document.getElementById('estimate-job-select').innerHTML = '';
      document.getElementById('estimate-dialog').classList.remove('hidden');
      document.getElementById('estimate-fields').classList.add('hidden');
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('estimate-title').textContent = 'Request Estimate';
    }
    
    function showRequestEstimateJobs(month) {
      const jobs = window.jobs[month] || [];
      let html = '<p class="text-gray-400 mb-2">Select Job:</p><div class="space-y-2 max-h-60 overflow-y-auto">';
      html += jobs.map((j, i) => `<button onclick="sendEstimateRequest('${month}', ${j.row})" class="w-full text-left p-3 bg-gray-800 rounded-lg hover:bg-gray-700"><div class="text-white font-bold">${j.owner || 'Unknown'}</div><div class="text-gray-400 text-sm">${j.address || 'No address'}</div></button>`).join('');
      html += '</div>';
      document.getElementById('estimate-job-select').innerHTML = html;
    }
    
    function sendEstimateRequest(month, row) {
      fetch(API + '/api/request-estimate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ month, row })
      }).then(r => r.json()).then(data => {
        alert(data.success ? 'Request sent!' : 'Error: ' + data.error);
        showMenu();
      });
    }

    // ========== ADD ESTIMATE ==========
    async function showEstimateModal() {
      await loadJobsIfNeeded();
      const months = Object.keys(window.jobs || {});
      if (months.length === 0) { alert('No jobs found'); return; }
      
      let html = '<p class="text-gray-400 mb-2">Select Month:</p><div class="flex flex-wrap gap-2">';
      html += months.map(m => `<button onclick="showEstimateJobs('${m}')" class="px-3 py-1 bg-gray-700 text-white rounded">${m}</button>`).join('');
      html += '</div>';
      
      document.getElementById('estimate-month-select').innerHTML = html;
      document.getElementById('estimate-job-select').innerHTML = '';
      document.getElementById('estimate-dialog').classList.remove('hidden');
      document.getElementById('estimate-fields').classList.add('hidden');
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('estimate-title').textContent = 'Add Estimate';
    }
    
    function showEstimateJobs(month) {
      const jobs = window.jobs[month] || [];
      let html = '<p class="text-gray-400 mb-2">Select Job:</p><div class="space-y-2 max-h-60 overflow-y-auto">';
      html += jobs.map((j, i) => `<button onclick="selectEstimateJob('${month}', ${j.row})" class="w-full text-left p-3 bg-gray-800 rounded-lg hover:bg-gray-700"><div class="text-white font-bold">${j.owner || 'Unknown'}</div><div class="text-gray-400 text-sm">${j.address || 'No address'}</div></button>`).join('');
      html += '</div>';
      document.getElementById('estimate-job-select').innerHTML = html;
    }
    
    let estimateSelectedJob = null;
    
    function selectEstimateJob(month, row) {
      estimateSelectedJob = { month, row };
      document.getElementById('estimate-fields').classList.remove('hidden');
      
      // Load contractors
      const select = document.getElementById('edit-contractor');
      select.innerHTML = '<option value="">Loading...</option>';
      fetch(API + '/api/contractors').then(r => r.json()).then(contractors => {
        select.innerHTML = '<option value="">Select Contractor</option>' + 
          contractors.map(c => `<option value="${c}">${c}</option>`).join('');
      });
    }
    
    function saveEstimate() {
      if (!estimateSelectedJob) return;
      const data = {
        month: estimateSelectedJob.month,
        row: estimateSelectedJob.row,
        estimateDate: document.getElementById('edit-estimateDate').value,
        squares: document.getElementById('edit-squares').value,
        primaryContractor: document.getElementById('edit-contractor').value,
        paid: document.getElementById('edit-paid').value
      };
      
      fetch(API + '/api/save-estimate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).then(r => r.json()).then(result => {
        alert(result.success ? 'Estimate saved!' : 'Error: ' + result.error);
        showMenu();
      });
    }

    // ========== REQUEST INSTALL ==========
    async function showRequestInstall() {
      await loadJobsIfNeeded();
      const months = Object.keys(window.jobs || {});
      if (months.length === 0) { alert('No jobs found'); return; }
      
      let html = '<p class="text-gray-400 mb-2">Select Month:</p><div class="flex flex-wrap gap-2">';
      html += months.map(m => `<button onclick="showRequestInstallJobs('${m}')" class="px-3 py-1 bg-gray-700 text-white rounded">${m}</button>`).join('');
      html += '</div>';
      
      document.getElementById('estimate-month-select').innerHTML = html;
      document.getElementById('estimate-job-select').innerHTML = '';
      document.getElementById('estimate-dialog').classList.remove('hidden');
      document.getElementById('estimate-fields').classList.add('hidden');
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('estimate-title').textContent = 'Request Install Date';
    }
    
    function showRequestInstallJobs(month) {
      const jobs = window.jobs[month] || [];
      let html = '<p class="text-gray-400 mb-2">Select Job:</p><div class="space-y-2 max-h-60 overflow-y-auto">';
      html += jobs.map((j, i) => `<button onclick="sendInstallRequest('${month}', ${j.row})" class="w-full text-left p-3 bg-gray-800 rounded-lg hover:bg-gray-700"><div class="text-white font-bold">${j.owner || 'Unknown'}</div><div class="text-gray-400 text-sm">${j.address || 'No address'}</div></button>`).join('');
      html += '</div>';
      document.getElementById('estimate-job-select').innerHTML = html;
    }
    
    function sendInstallRequest(month, row) {
      fetch(API + '/api/request-install', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ month, row })
      }).then(r => r.json()).then(data => {
        alert(data.success ? 'Request sent!' : 'Error: ' + data.error);
        showMenu();
      });
    }

    // ========== ADD INSTALL DATE ==========
    async function showInstallDateModal() {
      await loadJobsIfNeeded();
      const months = Object.keys(window.jobs || {});
      if (months.length === 0) { alert('No jobs found'); return; }
      
      let html = '<p class="text-gray-400 mb-2">Select Month:</p><div class="flex flex-wrap gap-2">';
      html += months.map(m => `<button onclick="showInstallJobs('${m}')" class="px-3 py-1 bg-gray-700 text-white rounded">${m}</button>`).join('');
      html += '</div>';
      
      document.getElementById('estimate-month-select').innerHTML = html;
      document.getElementById('estimate-job-select').innerHTML = '';
      document.getElementById('estimate-dialog').classList.remove('hidden');
      document.getElementById('estimate-fields').classList.add('hidden');
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('estimate-title').textContent = 'Add Install Date';
    }
    
    function showInstallJobs(month) {
      const jobs = window.jobs[month] || [];
      let html = '<p class="text-gray-400 mb-2">Select Job:</p><div class="space-y-2 max-h-60 overflow-y-auto">';
      html += jobs.map((j, i) => `<button onclick="selectInstallJob('${month}', ${j.row})" class="w-full text-left p-3 bg-gray-800 rounded-lg hover:bg-gray-700"><div class="text-white font-bold">${j.owner || 'Unknown'}</div><div class="text-gray-400 text-sm">${j.address || 'No address'}</div></button>`).join('');
      html += '</div>';
      document.getElementById('estimate-job-select').innerHTML = html;
    }
    
    let installSelectedJob = null;
    
    function selectInstallJob(month, row) {
      installSelectedJob = { month, row };
      document.getElementById('estimate-fields').classList.remove('hidden');
      document.getElementById('edit-estimateDate').parentElement.querySelector('label').textContent = 'Install Date:';
      document.getElementById('edit-squares').parentElement.style.display = 'none';
      document.getElementById('edit-contractor').parentElement.style.display = 'none';
      document.getElementById('edit-paid').parentElement.style.display = 'none';
      document.querySelector('#estimate-fields button').textContent = 'Save Install Date';
      document.querySelector('#estimate-fields button').onclick = saveInstallDate;
    }
    
    function saveInstallDate() {
      if (!installSelectedJob) return;
      const data = {
        month: installSelectedJob.month,
        row: installSelectedJob.row,
        installDate: document.getElementById('edit-estimateDate').value
      };
      
      fetch(API + '/api/save-install-date', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).then(r => r.json()).then(result => {
        alert(result.success ? 'Install date saved!' : 'Error: ' + result.error);
        showMenu();
      });
    }

    async function loadJobsIfNeeded() {
      alert('loadJobsIfNeeded called, API: ' + API);
      try {
        if (!window.jobs || Object.keys(window.jobs).length === 0) {
          showProgress(true, 'Loading...');
          alert('Fetching /api/jobs...');
          const response = await fetch(API + '/api/jobs');
          alert('Response status: ' + response.status);
          window.jobs = await response.json();
          alert('Jobs loaded: ' + Object.keys(window.jobs).join(', '));
          showProgress(false);
        }
      } catch(err) {
        alert('Error loading jobs: ' + err.message);
      }
    }
  </script>
</body>
</html>
