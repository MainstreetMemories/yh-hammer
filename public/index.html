<!DOCTYPE html>
<html>
<head>
  <title>Yellow Hammer Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>alert('JS LOADED');</script>
</head>
<body class="bg-neutral-900 text-white p-8">
  <h1 class="text-4xl text-yellow-500 font-bold mb-8">Yellow Hammer Properties</h1>
  
  <div id="menu" class="grid gap-4 max-w-md">
    <button onclick="uploadClick()" class="bg-yellow-500 text-black font-bold py-4 px-6 rounded">📷 Upload Contract</button>
    <button onclick="requestEstimate()" class="bg-orange-500 text-white font-bold py-4 px-6 rounded">📧 Request Estimate</button>
    <button onclick="addEstimate()" class="bg-green-500 text-white font-bold py-4 px-6 rounded">📋 Add Estimate</button>
    <button onclick="viewJobs()" class="bg-blue-500 text-white font-bold py-4 px-6 rounded">📋 View Jobs</button>
  </div>

  <input type="file" id="fileInput" onchange="handleFile(this)" class="hidden">

  <div id="confirm" class="hidden mt-8 p-4 bg-gray-800 rounded">
    <h2 class="text-yellow-500 text-xl font-bold mb-4">Confirm Data</h2>
    <div id="fields" class="space-y-2"></div>
    <button onclick="saveData()" class="bg-yellow-500 text-black font-bold py-2 px-4 rounded mt-4">Save</button>
    <button onclick="showMenu()" class="bg-red-500 text-white font-bold py-2 px-4 rounded mt-4">Cancel</button>
  </div>

  <div id="progress" class="hidden mt-8">
    <p class="text-yellow-500">Processing...</p>
  </div>

  <script>
    const API = window.location.origin;
    let data = {};

    function uploadClick() { 
      alert('Upload clicked');
      document.getElementById('fileInput').click(); 
    }
    
    function handleFile(input) {
      alert('File: ' + input.files[0].name);
      document.getElementById('progress').classList.remove('hidden');
      
      const reader = new FileReader();
      reader.onload = async function(e) {
        const imageData = e.target.result.split(',')[1];
        
        const response = await fetch(API + '/api/upload-json', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({file: imageData, isPdf: false, preview: true})
        });
        
        const result = await response.json();
        alert('Result: ' + (result.success ? 'OK' : 'Error'));
        
        document.getElementById('progress').classList.add('hidden');
        
        if (result.previewData) {
          data = result.previewData;
          showConfirm(result.previewData);
        }
      };
      reader.readAsDataURL(input.files[0]);
    }

    function showConfirm(d) {
      document.getElementById('menu').classList.add('hidden');
      const fields = ['owner','address','phone','email','totalCost','toooP'];
      let html = fields.map(f => '<div><label>'+f+':</label><input id="'+f+'" value="'+(d[f]||'')+'" class="bg-gray-700 p-2 w-full"></div>').join('');
      document.getElementById('fields').innerHTML = html;
      document.getElementById('confirm').classList.remove('hidden');
    }

    function saveData() {
      alert('Saving...');
      const fields = ['owner','address','phone','email','totalCost','toooP'];
      fields.forEach(f => data[f] = document.getElementById(f).value);
      data.month = 'April';
      
      fetch(API + '/api/save-extracted', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).then(r => r.json()).then(result => {
        alert(result.success ? 'Saved!' : 'Error');
        showMenu();
      });
    }

    function showMenu() {
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('confirm').classList.add('hidden');
    }

    function requestEstimate() { alert('Request Estimate - load jobs first'); }
    function addEstimate() { alert('Add Estimate - load jobs first'); }
    function viewJobs() { 
      alert('Loading jobs...');
      fetch(API + '/api/jobs').then(r => r.json()).then(j => {
        alert('Jobs: ' + Object.keys(j).join(', '));
      });
    }
  </script>
</body>
</html>
