<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yellow Hammer Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .btn-primary { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .btn-primary:active { transform: scale(0.98); }
  </style>
</head>
<body class="bg-gray-900 min-h-screen">
  <div class="max-w-md mx-auto p-4">
    <div class="text-center mb-8 pt-4">
      <h1 class="text-3xl font-bold text-amber-500">YELLOW HAMMER</h1>
      <p class="text-gray-400 text-sm">PROPERTIES, INC.</p>
    </div>

    <div id="status" class="hidden mb-4 p-3 rounded-lg text-center"></div>

    <div class="grid gap-4">
      <button onclick="document.getElementById('file-input').click()" class="btn-primary w-full py-6 px-6 rounded-xl text-white font-semibold text-lg shadow-lg flex items-center justify-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Upload Contract
      </button>
      <input type="file" id="file-input" accept=".pdf" class="hidden" onchange="handleFileSelect(event)">
    </div>

    <div id="progress" class="hidden mt-4">
      <div class="bg-gray-800 rounded-lg p-4">
        <p class="text-amber-500 text-center" id="progress-text">Processing...</p>
      </div>
    </div>

    <div class="mt-8">
      <h2 class="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-3">Recent Uploads</h2>
      <div id="recent-list" class="space-y-2">
        <p class="text-gray-500 text-sm italic">No recent uploads</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;

    function showStatus(message, isError = false) {
      const el = document.getElementById('status');
      el.className = `mb-4 p-3 rounded-lg text-center ${isError ? 'bg-red-900 text-red-200' : 'bg-green-900 text-green-200'}`;
      el.textContent = message;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }

    function showProgress(show, text = 'Processing...') {
      const el = document.getElementById('progress');
      document.getElementById('progress-text').textContent = text;
      el.className = show ? 'mt-4' : 'hidden';
    }

    async function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        showStatus('Please select a PDF file', true);
        return;
      }

      showProgress(true, 'Uploading and processing...');
      const formData = new FormData();
      formData.append('contract', file);

      try {
        const response = await fetch(`${API_URL}/api/upload`, { method: 'POST', body: formData });
        const result = await response.json();

        if (response.ok) {
          showStatus(`Contract added to ${result.month} tab!`);
          showMoveToDriveBtn();
        } else {
          showStatus(result.error || 'Error uploading', true);
        }
      } catch (err) {
        showStatus('Error uploading file', true);
      }

      showProgress(false);
      event.target.value = '';
    }

    function showMoveToDriveBtn() {
      const status = document.getElementById('status');
      status.innerHTML += `<br><br>
        <a href="https://drive.google.com/drive/folders/1q17eaOYiSijt76DWDgbsaL6nf3W8QimE" target="_blank"
           class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg text-sm">
          📁 Open CONTRACTS Folder
        </a>`;
    }
  </script>
</body>
</html>
