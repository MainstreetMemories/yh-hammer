<html>

  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<body class="p-4">

    <div class="text-center mb-8 pt-4">

      <h1 class="text-2xl text-yellow-400 font-extrabold tracking-wider">YELLOW HAMMER</h1>
      <p class="text-zinc-500 text-sm mt-1">Contract Management</p>
    </div>
  
    <!-- Main Menu -->
    <div id="menu" class="space-y-3">
      <!-- Primary Upload Button -->
      <button onclick="uploadClick()" class="btn-slick w-full py-5 px-5 rounded-2xl font-semibold text-yellow-400 flex items-center justify-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />

        Upload Contract

      <!-- Secondary Buttons Row 1 -->
      <div class="grid grid-cols-2 gap-3">
        <button onclick="requestEstimate()" class="btn-slick py-4 px-4 rounded-2xl font-medium text-white flex items-center justify-center gap-2">

        <button onclick="addInstallDate()" class="btn-slick py-4 px-4 rounded-2xl font-medium text-white flex items-center justify-center gap-2">
          <span class="text-lg">📅</span> Request Install Date

      <!-- Secondary Buttons Row 2 -->
      <div class="grid grid-cols-2 gap-3">
        <button onclick="addEstimate()" class="btn-slick py-4 px-4 rounded-2xl font-medium text-white flex items-center justify-center gap-2">
          <span class="text-lg">📝</span> Add Estimate
        </button>
        <button onclick="addInstallDate()" class="btn-slick py-4 px-4 rounded-2xl font-medium text-white flex items-center justify-center gap-2">
          <span class="text-lg">📋</span> Add Install Date

      <!-- View/Edit Jobs Button -->
      <button onclick="viewEditJobs()" class="btn-slick w-full py-4 px-4 rounded-2xl font-medium text-white flex items-center justify-center gap-2">
        <span class="text-lg">📂</span> View/Edit Jobs
      </button>
      
      <!-- Add Payment Button -->
      <button onclick="addPayment()" class="btn-slick w-full py-4 px-4 rounded-2xl font-medium text-white flex items-center justify-center gap-2">
        <span class="text-lg">💰</span> Add Payment
      </button>
    </div>

    <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFile(this)" class="hidden">

    <!-- Confirm Card -->
    <div id="confirm" class="hidden">
      <div class="glass rounded-3xl p-6 glow">
        <h2 id="modalTitle" class="text-xl font-bold text-white mb-6 text-center">Confirm Data</h2>
        <div id="fields" class="space-y-4"></div>
        <div id="staticButtons" class="flex gap-3 mt-6">
          <button onclick="saveData()" class="flex-1 bg-yellow-500 hover:bg-yellow-400 py-3 rounded-xl font-bold text-black transition-all">Save</button>
          <button onclick="showMenu()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-xl font-medium text-white transition-all">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Loading -->
    <div id="progress" class="hidden text-center py-8">
      <div class="glass inline-flex items-center gap-3 py-4 px-8 rounded-2xl">
        <svg class="animate-spin h-6 w-6 text-yellow-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="text-yellow-400 font-medium">Processing...</span>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let data = {};

    function uploadClick() { 
      document.getElementById('fileInput').click(); 
    }
    
    async function handleFile(input) {
      if (!input.files[0]) return;
      
      const file = input.files[0];
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('progress').classList.remove('hidden');
      document.getElementById('confirm').classList.add('hidden');
      
      // Reset for next upload
      data = {};
      input.value = '';
      
      try {
        let imageBase64;
        
        if (file.type === 'application/pdf') {
          const images = await convertPdfToImages(file);
          imageBase64 = images.join('||PAGE||');
        } else {
          imageBase64 = await fileToBase64(file);
        }
        
        const response = await fetch(API + '/api/upload-json', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({file: imageBase64, isPdf: true, preview: true})
        });
        
        const result = await response.json();
        document.getElementById('progress').classList.add('hidden');
        
        if (result.success && result.previewData) {
          data = result.previewData;
          showConfirm(result.previewData);
        } else {
          alert('Error: ' + (result.error || 'Unknown error'));
          showMenu();
        }
      } catch (err) {
        alert('Error: ' + err.message);
        document.getElementById('progress').classList.add('hidden');
        showMenu();
      }
    }
    
    async function convertPdfToImages(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const images = [];
      
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 2 });
        
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        const imageData = canvas.toDataURL('image/jpeg').split(',')[1];
        images.push(imageData);
      }
      
      return images;
    }
    
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function showConfirm(d) {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('modalTitle').innerText = 'Confirm Data';
      document.getElementById('staticButtons').classList.remove('hidden');
      
      // All columns A-Z
      const fields = [
        'address','certOfComp','contractDate','estimateDate','installDate','owner',
        'totalCost','requiredDownPayment','financeAmount','additionalExpense',
        'totalBalanceDue','toooP','depAmtHeld','amountDue','pmntMethod',
        'datePaid','checkNumber','amountPaid','dripEdgeColor','ventilationColor',
        'manufacturer','shingleType','shingleColor','estimatedSquares','notes',
        'phone','email','salesperson'
      ];
      
      const labels = {
        address:'Address', certOfComp:'Cert Of Comp', contractDate:'Contract Date',
        estimateDate:'Estimate Date', installDate:'Install Date', owner:'Owner',
        totalCost:'Total Cost', requiredDownPayment:'Down Payment', financeAmount:'Finance',
        additionalExpense:'Additional', totalBalanceDue:'Balance Due', toooP:'T.O.O.P',
        depAmtHeld:'DEP Held', amountDue:'Amount Due', pmntMethod:'Payment Method',
        datePaid:'Date Paid', checkNumber:'Check #', amountPaid:'Paid',
        dripEdgeColor:'Drip Edge', ventilationColor:'Ventilation', manufacturer:'Manufacturer',
        shingleType:'Shingle Type', shingleColor:'Color', estimatedSquares:'Squares',
        notes:'Notes', phone:'Phone', email:'Email', salesperson:'Salesperson'
      };
      
      let html = '<div class="grid grid-cols-2 gap-3">';
      fields.forEach(f => {
        html += `<div>
          <label class="text-zinc-500 text-xs uppercase tracking-wide font-medium">${labels[f]}</label>
          <input id="${f}" value="${(d[f]||'')}" class="input-slick w-full p-3 rounded-xl text-white text-sm mt-1">
        </div>`;
      });
      html += '</div>';
      
      document.getElementById('fields').innerHTML = html;
      document.getElementById('confirm').classList.remove('hidden');
    }

    function saveData() {
      // Calculate month from contract date
      const contractDateVal = document.getElementById('contractDate')?.value || '';
      let month = 'April'; // default
      if (contractDateVal) {
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        // Try to parse date ( formats like 3/19/26, 03/19/2026, etc)
        const dateMatch = contractDateVal.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
        if (dateMatch) {
          const m = parseInt(dateMatch[1]) - 1;
          if (m >= 0 && m <= 11) month = months[m];
        }
      }
      data.month = month;
      
      const fields = [
        'address','certOfComp','contractDate','estimateDate','installDate','owner',
        'totalCost','requiredDownPayment','financeAmount','additionalExpense',
        'totalBalanceDue','toooP','depAmtHeld','amountDue','pmntMethod',
        'datePaid','checkNumber','amountPaid','dripEdgeColor','ventilationColor',
        'manufacturer','shingleType','shingleColor','estimatedSquares','notes',
        'phone','email','salesperson'
      ];
      fields.forEach(f => data[f] = document.getElementById(f)?.value || '');
      
      fetch(API + '/api/save-extracted', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).then(r => r.json()).then(result => {
        alert(result.success ? '✓ Saved!' : 'Error: ' + result.error);
        showMenu();
      }).catch(err => alert('Save error: ' + err.message));
    }

    function showMenu() {
      document.getElementById('modalTitle').innerText = 'Confirm Data';
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('confirm').classList.add('hidden');
      document.getElementById('progress').classList.add('hidden');
      document.getElementById('staticButtons').classList.remove('hidden');
    }

    function requestEstimate() {
      fetch(API + '/api/jobs')
        .then(r => r.json())
        .then(months => {
          const monthNames = Object.keys(months).filter(m => m !== 'Contractor' && months[m].length > 0);
          if (monthNames.length === 0) {
            alert('No jobs found');
            return;
          }
          
          // Build month buttons
          let html = '<div class="grid grid-cols-3 gap-2 mb-4">';
          monthNames.forEach(m => {
            html += `<button onclick="showJobs('${m}')" class="btn-slick py-3 px-4 rounded-xl font-medium text-white">${m}</button>`;
          });
          html += '</div><button onclick="showMenu()" class="text-zinc-500 text-sm">← Back</button>';
          
          document.getElementById('menu').classList.add('hidden');
          document.getElementById('modalTitle').innerText = 'Select Month'; document.getElementById('fields').innerHTML = html;
          document.getElementById('confirm').classList.remove('hidden');
        })
        .catch(e => alert('Error: ' + e.message));
    }
    
    function showJobs(month) {
      fetch(API + '/api/jobs')
        .then(r => r.json())
        .then(months => {
          const jobs = months[month] || [];
          if (jobs.length === 0) return;
          
          let html = '<div class="space-y-2">';
          jobs.forEach(j => {
            html += `<button onclick="requestEstimateForJob('${month}', ${j.row})" class="btn-slick w-full py-3 px-4 rounded-xl font-medium text-white text-left">
              ${j.owner}<br><span class="text-zinc-500 text-sm">${j.address}</span>
            </button>`;
          });
          html += '</div>';
          
          document.getElementById('fields').innerHTML = '<h3 class="text-white font-bold mb-3">Select Job</h3>' + html + '<button onclick="requestEstimate()" class="text-zinc-500 text-sm mt-3">← Back</button>';
        });
    }
    
    function requestEstimateForJob(month, row) {
      fetch(API + '/api/request-estimate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ month, row })
      }).then(r => r.json()).then(result => {
        alert(result.success ? '✓ Request sent!' : 'Error: ' + result.error);
        showMenu();
      }).catch(err => alert('Error: ' + err.message));
    }

    function addEstimate() {
      fetch(API + '/api/contractors')
        .then(r => r.json())
        .then(contractors => {
          sessionStorage.setItem('contractors', JSON.stringify(contractors));
          
          fetch(API + '/api/jobs')
            .then(r => r.json())
            .then(months => {
              const monthNames = Object.keys(months).filter(m => m !== 'Contractor' && months[m].length > 0);
              if (monthNames.length === 0) {
                alert('No jobs found');
                return;
              }
              
              let html = '<div class="grid grid-cols-3 gap-2 mb-4">';
              monthNames.forEach(m => {
                html += `<button onclick="showEstimateJobs('${m}')" class="btn-slick py-3 px-4 rounded-xl font-medium text-white">${m}</button>`;
              });
              html += '</div><button onclick="showMenu()" class="text-zinc-500 text-sm">← Back</button>';
              
              document.getElementById('menu').classList.add('hidden');
              document.getElementById('modalTitle').innerText = 'Select Month';
              document.getElementById('fields').innerHTML = html;
              document.getElementById('confirm').classList.remove('hidden');
            });
        })
        .catch(e => alert('Error: ' + e.message));
    }
    
    function showEstimateJobs(month) {
      fetch(API + '/api/jobs')
        .then(r => r.json())
        .then(months => {
          const jobs = months[month] || [];
          if (jobs.length === 0) return;
          
          let html = '<div class="space-y-2">';
          jobs.forEach(j => {
            html += `<button onclick="showEstimateForm('${month}', ${j.row})" class="btn-slick w-full py-3 px-4 rounded-xl font-medium text-white text-left">
              ${j.owner}<br><span class="text-zinc-500 text-sm">${j.address}</span>
            </button>`;
          });
          html += '</div>';
          
          document.getElementById('modalTitle').innerText = 'Select Job';
          document.getElementById('fields').innerHTML = html + '<button onclick="addEstimate()" class="text-zinc-500 text-sm mt-3">← Back</button>';
        });
    }
    
    function showEstimateForm(month, row) {
      fetch(API + '/api/get-job?month=' + month + '&row=' + row)
        .then(r => r.json())
        .then(job => {
          // Convert date to YYYY-MM-DD for date input
          let dateValue = '';
          if (job.estimateDate) {
            const parts = job.estimateDate.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (parts) {
              let y = parts[3];
              if (y.length === 2) y = '20' + y;
              const m = parts[1].padStart(2, '0');
              const d = parts[2].padStart(2, '0');
              dateValue = y + '-' + m + '-' + d;
            }
          }
          
          const contractors = JSON.parse(sessionStorage.getItem('contractors') || '[]');
          const contractorOptions = contractors.map(c => 
            `<option value="${c}" ${job.manufacturer === c ? 'selected' : ''}>${c}</option>`
          ).join('');
          
          document.getElementById('modalTitle').innerText = 'Add Estimate';
          document.getElementById('staticButtons').classList.add('hidden');
          document.getElementById('fields').innerHTML = 
            `<div class="space-y-4">
              <div>
                <label class="text-zinc-500 text-xs uppercase tracking-wide font-medium">Estimate Date</label>
                <input id="estimateDate" type="date" value="${dateValue}" class="input-slick w-full p-3 rounded-xl text-white text-sm mt-1" style="color-scheme: dark;">
              </div>
              <div>
                <label class="text-zinc-500 text-xs uppercase tracking-wide font-medium">Primary Contractor</label>
                <select id="contractor" class="input-slick w-full p-3 rounded-xl text-white text-sm mt-1">
                  <option value="">Select Contractor</option>
                  ${contractorOptions}
                </select>
              </div>
              <div>
                <label class="text-zinc-500 text-xs uppercase tracking-wide font-medium">Paid</label>
                <input id="paid" type="text" value="${job.paid || ''}" class="input-slick w-full p-3 rounded-xl text-white text-sm mt-1" placeholder="">
              </div>
              <button onclick="saveEstimate('${month}', ${row})" class="bg-yellow-500 w-full py-3 rounded-xl font-bold text-black">Save</button>
            </div>
            <button onclick="addEstimate()" class="text-zinc-500 text-sm mt-3">← Back</button>`;
        });
    }
    
    function saveEstimate(month, row) {
      const data = {
        month,
        row,
        estimateDate: document.getElementById('estimateDate').value,
        manufacturer: document.getElementById('contractor').value,
        paid: document.getElementById('paid').value
      };
      
      fetch(API + '/api/save-estimate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).then(r => r.json()).then(result => {
        alert(result.success ? '✓ Saved!' : 'Error: ' + result.error);
        showMenu();
      }).catch(err => alert('Error: ' + err.message));
    }
    
    // Add Payment Function
    // Add Payment Function
    function addPayment() {
      fetch(API + '/api/jobs')
        .then(r => r.json())
        .then(months => {
          const monthNames = Object.keys(months).filter(m => m !== 'Contractor' && months[m].length > 0);
          if (monthNames.length === 0) {
            alert('No jobs found');
            return;
          }
          
          let html = '<div class="grid grid-cols-3 gap-2 mb-4">';
          monthNames.forEach(m => {
            html += `<button onclick="showPaymentJobs('${m}')" class="btn-slick py-3 px-4 rounded-xl font-medium text-white">${m}</button>`;
          });
          html += '</div><button onclick="showMenu()" class="text-zinc-500 text-sm">← Back</button>';
          
          document.getElementById('menu').classList.add('hidden');
          document.getElementById('modalTitle').innerText = 'Select Month';
          document.getElementById('fields').innerHTML = html;
          document.getElementById('confirm').classList.remove('hidden');
        })
        .catch(e => alert('Error: ' + e.message));
    }
    
    function showPaymentJobs(month) {
      fetch(API + '/api/jobs')
        .then(r => r.json())
        .then(months => {
          const jobs = months[month] || [];
          if (jobs.length === 0) return;
          
          let html = '<div class="space-y-2">';
          jobs.forEach(j => {
            html += `<button onclick="showPaymentForm('${month}', ${j.row})" class="btn-slick w-full py-3 px-4 rounded-xl font-medium text-white text-left">
              ${j.owner}<br><span class="text-zinc-500 text-sm">${j.address}</span>
            </button>`;
          });
          html += '</div>';
          
          document.getElementById('modalTitle').innerText = 'Select Job';
          document.getElementById('fields').innerHTML = html + '<button onclick="addPayment()" class="text-zinc-500 text-sm mt-3">← Back</button>';
        });
    }
    
    function showPaymentForm(month, row) {
      fetch(API + '/api/get-job?month=' + month + '&row=' + row)
        .then(r => r.json())
        .then(job => {
          // Convert date to YYYY-MM-DD for date input

              if (y.length === 2) y = '20' + y;
              const m = parts[1].padStart(2, '0');
              const d = parts[2].padStart(2, '0');
              dateValue = y + '-' + m + '-' + d;
            }
          }
          
          // All payment fields as editable inputs
          let paymentHtml = `
            <div class="bg-zinc-800 rounded-xl p-4 mb-4">
              <h3 class="text-yellow-400 font-bold mb-3">💵 Homeowner Payment</h3>
              <div class="space-y-2">
                <input id="datePaid" type="date" value="${dateValue}" class="input-slick w-full p-3 rounded-xl text-white text-sm" placeholder="Date Paid" style="color-scheme: dark;">
                <input id="checkNum" class="input-slick w-full p-3 rounded-xl text-white text-sm" placeholder="Check #" value="${job.checkNum || ''}">
                <input id="amountPaid" class="input-slick w-full p-3 rounded-xl text-white text-sm" placeholder="Amount" value="${job.amountPaid || ''}">
              </div>
            </div>
            <div class="bg-zinc-800 rounded-xl p-4 mb-4">
              <h3 class="text-blue-400 font-bold mb-3">🏠 Depreciation</h3>
              <div class="space-y-2">
                <input id="depCheckNum" class="input-slick w-full p-3 rounded-xl text-white text-sm" placeholder="Check #" value="${job.depCheckNum || ''}">
                <input id="depAmount" class="input-slick w-full p-3 rounded-xl text-white text-sm" placeholder="Amount" value="${job.depAmount || ''}">
              </div>
            </div>
            <div class="bg-zinc-800 rounded-xl p-4 mb-4">
              <h3 class="text-orange-400 font-bold mb-3">👷 Labor Payment</h3>
              <div class="space-y-2">
                <input id="laborContractor" class="input-slick w-full p-3 rounded-xl text-white text-sm" placeholder="Contractor" value="${job.laborContractor || ''}">
                <input id="laborCheckNum" class="input-slick w-full p-3 rounded-xl text-white text-sm" placeholder="Check #" value="${job.laborCheckNum || ''}">
                <input id="laborPaid" class="input-slick w-full p-3 rounded-xl text-white text-sm" placeholder="Amount" value="${job.laborPaid || ''}">
              </div>
            </div>
            <div class="bg-zinc-800 rounded-xl p-4 mb-4">

    function addInstallDate() {
      fetch(API + '/api/jobs')
        .then(r => r.json())
        .then(months => {
          const monthNames = Object.keys(months).filter(m => m !== 'Contractor' && months[m].length > 0);
          if (monthNames.length === 0) {
            alert('No jobs found');
            return;
          }
          
          let html = '<div class="grid grid-cols-3 gap-2 mb-4">';
          monthNames.forEach(m => {
            html += `<button onclick="showInstallDateJobs('${m}')" class="btn-slick py-3 px-4 rounded-xl font-medium text-white">${m}</button>`;
          });
          html += '</div><button onclick="showMenu()" class="text-zinc-500 text-sm">← Back</button>';
          
          document.getElementById('menu').classList.add('hidden');
          document.getElementById('modalTitle').innerText = 'Select Month';
          document.getElementById('fields').innerHTML = html;
          document.getElementById('confirm').classList.remove('hidden');
        })
        .catch(e => alert('Error: ' + e.message));
    }
    
    function showInstallDateJobs(month) {
      fetch(API + '/api/jobs')
        .then(r => r.json())
        .then(months => {
          const jobs = months[month] || [];
          if (jobs.length === 0) return;
          
          let html = '<div class="space-y-2">';
          jobs.forEach(j => {
            html += `<button onclick="showInstallDateForm('${month}', ${j.row})" class="btn-slick w-full py-3 px-4 rounded-xl font-medium text-white text-left">
              ${j.owner}<br><span class="text-zinc-500 text-sm">${j.address}</span>
            </button>`;
          });
          html += '</div>';
          
          document.getElementById('modalTitle').innerText = 'Select Job';
          document.getElementById('fields').innerHTML = html + '<button onclick="addInstallDate()" class="text-zinc-500 text-sm mt-3">← Back</button>';
        });
    }
    
    function showInstallDateForm(month, row) {
      fetch(API + '/api/get-job?month=' + month + '&row=' + row)
        .then(r => r.json())
        .then(job => {
          // Convert date to YYYY-MM-DD for date input
          let dateValue = '';
          if (job.installDate) {
            const parts = job.installDate.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (parts) {
              let y = parts[3];
              if (y.length === 2) y = '20' + y;
              const m = parts[1].padStart(2, '0');
              const d = parts[2].padStart(2, '0');
              dateValue = y + '-' + m + '-' + d;
            }
          }
          
          document.getElementById('modalTitle').innerText = 'Add Install Date';
          document.getElementById('staticButtons').classList.add('hidden');
          document.getElementById('fields').innerHTML = 
            `<div class="space-y-4">
              <div>
                <label class="text-zinc-500 text-xs uppercase tracking-wide font-medium">Install Date</label>
                <input id="installDate" type="date" value="${dateValue}" class="input-slick w-full p-3 rounded-xl text-white text-sm mt-1" style="color-scheme: dark;">
              </div>
              <button onclick="saveInstallDate('${month}', ${row})" class="bg-yellow-500 w-full py-3 rounded-xl font-bold text-black">Save</button>
            </div>
            <button onclick="addInstallDate()" class="text-zinc-500 text-sm mt-3">← Back</button>`;
        });
    }
    
    function saveInstallDate(month, row) {
      const data = {
        month,
        row,
        installDate: document.getElementById('installDate').value
      };
      
      fetch(API + '/api/save-install-date', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).then(r => r.json()).then(result => {
        alert(result.success ? '✓ Saved!' : 'Error: ' + result.error);
        showMenu();
      }).catch(err => alert('Error: ' + err.message));
    }

    function showEditJobForm(month, row) {
      fetch(API + '/api/get-job?month=' + month + '&row=' + row)
        .then(r => r.json())
        .then(job => {
          // Convert date to YYYY-MM-DD for date inputs
          const toDateValue = (dateStr) => {
            if (!dateStr) return '';
            const parts = dateStr.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (parts) {
              let y = parts[3];
              if (y.length === 2) y = '20' + y;
              const m = parts[1].padStart(2, '0');
              const d = parts[2].padStart(2, '0');
              return y + '-' + m + '-' + d;
            }
            return '';
          };
          
          // All editable fields (skipping P and AA - columns 15 and 26)
          const editFields = [
            {id:'address', label:'Address', val:job.address||''},
            {id:'certOfComp', label:'Cert Of Comp', val:job.certOfComp||''},
            {id:'contractDate', label:'Contract Date', val:toDateValue(job.contractDate)},
            {id:'estimateDate', label:'Estimate Date', val:toDateValue(job.estimateDate)},
            {id:'installDate', label:'Install Date', val:toDateValue(job.installDate)},
            {id:'owner', label:'Owner', val:job.owner||''},
            {id:'totalCost', label:'Total Cost', val:job.totalCost||''},
            {id:'requiredDownPayment', label:'Down Payment', val:job.requiredDownPayment||''},
            {id:'financeAmount', label:'Finance Amount', val:job.financeAmount||''},
            {id:'additionalExpense', label:'Additional Expense', val:job.additionalExpense||''},
            {id:'toooP', label:'T.O.O.P', val:job.toooP||''},
            {id:'depAmtHeld', label:'DEP Amt Held', val:job.depAmtHeld||''},
            {id:'amountDue', label:'Amount Due', val:job.amountDue||''},
            {id:'pmntMethod', label:'Payment Method', val:job.pmntMethod||''},
            {id:'phone', label:'Phone', val:job.phone||''},
            {id:'email', label:'Email', val:job.email||''},
            {id:'datePaid', label:'Date Paid', val:toDateValue(job.datePaid)},
            {id:'checkNum', label:'Check #', val:job.checkNum||''},
            {id:'amountPaid', label:'Amount Paid', val:job.amountPaid||''},
            // Labor Payment
            {id:'laborContractor', label:'Labor Contractor', val:job.laborContractor||''},
            {id:'laborCheckNum', label:'Labor Check #', val:job.laborCheckNum||''},
            {id:'laborPaid', label:'Labor Paid', val:job.laborPaid||''},
            // Salesperson Commission
            {id:'salesCheckNum', label:'Sales Comm Check #', val:job.salesCheckNum||''},
            {id:'salesperson', label:'Salesperson', val:job.salesperson||''},
            {id:'salesPaid', label:'Sales Comm Paid', val:job.salesPaid||''},
            // Depreciation
            {id:'depCheckNum', label:'DEP Check #', val:job.depCheckNum||''},
            {id:'depAmount', label:'DEP Amount', val:job.depAmount||''},
            // Salesperson Depreciation
            {id:'salesDepCheckNum', label:'Sales DEP Check #', val:job.salesDepCheckNum||''},
            {id:'salesDepAmount', label:'Sales DEP Amount', val:job.salesDepAmount||''},
            {id:'dripEdgeColor', label:'Drip Edge Color', val:job.dripEdgeColor||''},
            {id:'ventilationColor', label:'Ventilation Color', val:job.ventilationColor||''},
            {id:'manufacturer', label:'Manufacturer', val:job.manufacturer||''},
            {id:'shingleType', label:'Shingle Type', val:job.shingleType||''},
            {id:'shingleColor', label:'Shingle Color', val:job.shingleColor||''},
            {id:'estimatedSquares', label:'Estimated Squares', val:job.estimatedSquares||''},
            {id:'notes', label:'Notes', val:job.notes||'', isTextarea:true}
          ];
          
          let html = '<div class="space-y-3 max-h-[60vh] overflow-y-auto pr-2">';
          editFields.forEach(f => {
            if (f.isTextarea) {
              html += `<div>
                <label class="text-zinc-500 text-xs uppercase tracking-wide font-medium">${f.label}</label>
                <textarea id="${f.id}" rows="3" class="input-slick w-full p-3 rounded-xl text-white text-sm mt-1">${f.val}</textarea>
              </div>`;
            } else if (f.label.includes('Date')) {
              html += `<div>
                <label class="text-zinc-500 text-xs uppercase tracking-wide font-medium">${f.label}</label>
                <input id="${f.id}" type="date" value="${f.val}" class="input-slick w-full p-3 rounded-xl text-white text-sm mt-1" style="color-scheme: dark;">
              </div>`;
            } else {
              html += `<div>
                <label class="text-zinc-500 text-xs uppercase tracking-wide font-medium">${f.label}</label>
                <input id="${f.id}" value="${f.val}" class="input-slick w-full p-3 rounded-xl text-white text-sm mt-1">
              </div>`;
            }
          });
          html += '</div>';
          
          document.getElementById('modalTitle').innerText = 'Edit Job';
          document.getElementById('staticButtons').classList.add('hidden');
          document.getElementById('fields').innerHTML = html + 
            `<div class="flex gap-3 mt-4">
              <button onclick="saveEditedJob('${month}', ${row})" class="flex-1 bg-yellow-500 py-3 rounded-xl font-bold text-black">Save</button>
              <button onclick="viewEditJobs()" class="flex-1 bg-zinc-800 py-3 rounded-xl font-medium text-white">Cancel</button>
            </div>`;
        });
    }
