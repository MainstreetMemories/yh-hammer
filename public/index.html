
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yellow Hammer Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .btn-primary { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
  </style>
</head>
<body class="bg-gray-900 min-h-screen">
  <div class="max-w-md mx-auto p-4">
    <div class="text-center mb-8 pt-4">
      <div id="logo-container">
        <h1 class="text-3xl font-bold text-amber-500">YELLOW HAMMER</h1>
        <p class="text-gray-400 text-sm">PROPERTIES, INC.</p>
      </div>
    </div>

    <div id="status" class="hidden mb-4 p-3 rounded-lg text-center"></div>

    <!-- Main Menu -->
    <div id="menu" class="grid gap-4">
      <button onclick="startUpload()" class="btn-primary w-full py-6 px-6 rounded-xl text-white font-semibold text-lg shadow-lg flex items-center justify-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Upload Contract
      </button>

      <button onclick="showEditRecords()" class="btn-secondary w-full py-6 px-6 rounded-xl text-white font-semibold text-lg shadow-lg flex items-center justify-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
        Edit Records
      </button>

      <input type="file" id="file-input" accept=".pdf" class="hidden" onchange="handleFileSelect(event)">
    </div>

    <!-- Jobs List View -->
    <div id="jobs-view" class="hidden">
      <button onclick="showMenu()" class="mb-4 text-amber-500 flex items-center gap-2">
        ← Back to Menu
      </button>
      <h2 class="text-white text-xl font-semibold mb-4">Edit Records</h2>
      
      <!-- Month Tabs -->
      <div id="month-tabs" class="flex flex-wrap gap-2 mb-4"></div>
      
      <!-- Jobs List -->
      <div id="jobs-list" class="space-y-2"></div>
    </div>

    <!-- Job Detail View -->
    <div id="detail-view" class="hidden">
      <button onclick="showJobsList()" class="mb-4 text-amber-500 flex items-center gap-2">
        ← Back to Jobs
      </button>
      <h2 class="text-white text-xl font-semibold mb-4" id="detail-owner"></h2>
      <h3 class="text-gray-400 text-sm mb-4" id="detail-address"></h3>
      
      <div id="detail-fields" class="space-y-4"></div>
      
      <div class="flex gap-2 mt-6">
        <button onclick="prevPage()" class="flex-1 py-3 bg-gray-700 text-white rounded-lg">← Previous</button>
        <button onclick="nextPage()" class="flex-1 py-3 bg-gray-700 text-white rounded-lg">Next →</button>
      </div>
    </div>

    <div id="progress" class="hidden mt-4">
      <div class="bg-gray-800 rounded-lg p-4">
        <p class="text-amber-500 text-center" id="progress-text">Processing...</p>
      </div>
    </div>

    <div class="mt-8">
      <h2 class="text-gray-400 text-sm font-semibold uppercase tracking-wider mb-3">Recent Uploads</h2>
      <div id="recent-list" class="space-y-2">
        <p class="text-gray-500 text-sm italic">No recent uploads</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    let allJobs = {};
    let currentMonth = '';
    let currentJobs = [];
    let currentJobIndex = 0;
    let currentPage = 0;

    const fieldPages = [
      { title: 'Property', fields: ['address', 'owner', 'phone', 'email'] },
      { title: 'Dates', fields: ['contractDate', 'estimateDate', 'installDate'] },
      { title: 'Financials', fields: ['totalCost', 'downPayment', 'balanceDue', 'tooP'] },
      { title: 'Materials', fields: ['manufacturer', 'shingleType', 'shingleColor', 'dripEdge', 'ventilation'] },
      { title: 'Payment', fields: ['pmntMethod', 'datePaid', 'checkNum', 'amountPaid'] },
      { title: 'Notes', fields: ['notes'] }
    ];

    const fieldLabels = {
      address: 'Address', owner: 'Owner', phone: 'Phone', email: 'Email',
      contractDate: 'Contract Date', estimateDate: 'Estimate Date', installDate: 'Install Date',
      totalCost: 'Total Cost', downPayment: 'Down Payment', balanceDue: 'Balance Due', tooP: 'Total Out of Pocket',
      manufacturer: 'Manufacturer', shingleType: 'Shingle Type', shingleColor: 'Shingle Color',
      dripEdge: 'Drip Edge', ventilation: 'Ventilation', pmntMethod: 'Payment Method',
      datePaid: 'Date Paid', checkNum: 'Check #', amountPaid: 'Amount Paid', notes: 'Notes'
    };

    function showStatus(message, isError = false) {
      const el = document.getElementById('status');
      el.className = `mb-4 p-3 rounded-lg text-center ${isError ? 'bg-red-900 text-red-200' : 'bg-green-900 text-green-200'}`;
      el.textContent = message;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }

    function showProgress(show, text = 'Processing...') {
      const el = document.getElementById('progress');
      document.getElementById('progress-text').textContent = text;
      el.className = show ? 'mt-4' : 'hidden';
    }

    function showMenu() {
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('jobs-view').classList.add('hidden');
      document.getElementById('detail-view').classList.add('hidden');
    }

    function showEditRecords() {
      showProgress(true, 'Loading records...');
      fetch(`${API_URL}/api/jobs`)
        .then(r => r.json())
        .then(jobs => {
          allJobs = jobs;
          const months = Object.keys(jobs);
          const currentMonthIdx = months.indexOf('April');
          currentMonth = months[currentMonthIdx >= 0 ? currentMonthIdx : 0] || months[0];
          showMonthTabs(months);
          showJobsForMonth(currentMonth);
          document.getElementById('menu').classList.add('hidden');
          document.getElementById('jobs-view').classList.remove('hidden');
        })
        .catch(err => showStatus('Error loading records', true))
        .finally(() => showProgress(false));
    }

    function showMonthTabs(months) {
      const tabs = document.getElementById('month-tabs');
      tabs.innerHTML = months.map(m => 
        `<button onclick="selectMonth('${m}')" class="px-3 py-1 rounded text-sm font-medium ${m === currentMonth ? 'bg-amber-500 text-white' : 'bg-gray-700 text-gray-300'}">${m}</button>`
      ).join('');
    }

    function selectMonth(month) {
      currentMonth = month;
      showJobsForMonth(month);
    }

    function showJobsForMonth(month) {
      currentJobs = allJobs[month] || [];
      const list = document.getElementById('jobs-list');
      
      if (currentJobs.length === 0) {
        list.innerHTML = '<p class="text-gray-500 text-sm italic">No jobs in this month</p>';
        return;
      }

      list.innerHTML = currentJobs.map((job, idx) => `
        <div onclick="showJobDetail(${idx})" class="bg-gray-800 p-3 rounded-lg cursor-pointer hover:bg-gray-700">
          <div class="text-white font-medium">${job.owner || 'Unknown'}</div>
          <div class="text-gray-400 text-sm truncate">${job.address || 'No address'}</div>
          <div class="text-amber-500 text-sm">$${job.totalCost || '0'}</div>
        </div>
      `).join('');
    }

    function showJobsList() {
      document.getElementById('jobs-view').classList.remove('hidden');
      document.getElementById('detail-view').classList.add('hidden');
    }

    function showJobDetail(index) {
      currentJobIndex = index;
      currentPage = 0;
      const job = currentJobs[index];
      
      document.getElementById('detail-owner').textContent = job.owner || 'Unknown';
      document.getElementById('detail-address').textContent = job.address || '';
      
      showDetailPage();
      document.getElementById('jobs-view').classList.add('hidden');
      document.getElementById('detail-view').classList.remove('hidden');
    }

    function showDetailPage() {
      const job = currentJobs[currentJobIndex];
      const page = fieldPages[currentPage];
      
      const fieldsDiv = document.getElementById('detail-fields');
      fieldsDiv.innerHTML = `
        <h4 class="text-amber-500 font-semibold text-center mb-4">${page.title}</h4>
        ${page.fields.map(field => `
          <div>
            <label class="block text-gray-400 text-xs mb-1">${fieldLabels[field]}</label>
            <input type="text" data-field="${field}" value="${job[field] || ''}"
              class="w-full bg-gray-800 text-white px-3 py-2 rounded border border-gray-700 focus:border-amber-500 focus:outline-none"
              onchange="saveField('${field}', this.value)">
          </div>
        `).join('')}
        <div class="text-center text-gray-500 text-sm mt-4">Page ${currentPage + 1} of ${fieldPages.length}</div>
      `;
    }

    function saveField(field, value) {
      const job = currentJobs[currentJobIndex];
      fetch(`${API_URL}/api/jobs/update`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ month: currentMonth, row: job.row, field, value })
      }).then(r => r.json()).then(data => {
        if (data.success) {
          job[field] = value;
          showStatus('Saved!');
        }
      });
    }

    function prevPage() {
      if (currentPage > 0) { currentPage--; showDetailPage(); }
    }

    function nextPage() {
      if (currentPage < fieldPages.length - 1) { currentPage++; showDetailPage(); }
    }

    function startUpload() {
      document.getElementById('file-input').click();
    }

    async function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      if (!file.name.toLowerCase().endsWith('.pdf')) {
        showStatus('Please select a PDF file', true);
        return;
      }

      showProgress(true, 'Uploading and processing contract...');
      const formData = new FormData();
      formData.append('contract', file);

      try {
        const response = await fetch(`${API_URL}/api/upload`, { method: 'POST', body: formData });
        const result = await response.json();
        if (response.ok) {
          showStatus(`Contract added to ${result.month}!`);
          addToRecentList(file.name, result.month);
        } else {
          showStatus(result.error || 'Error', true);
        }
      } catch (err) { showStatus('Error uploading', true); }

      showProgress(false);
      event.target.value = '';
    }

    function addToRecentList(filename, month) {
      const list = document.getElementById('recent-list');
      const emptyMsg = list.querySelector('p');
      if (emptyMsg) emptyMsg.remove();
      list.innerHTML = `<div class="bg-gray-800 p-3 rounded-lg flex justify-between items-center">
        <span class="text-white text-sm truncate">${filename}</span>
        <span class="text-amber-500 text-xs font-semibold">${month}</span>
      </div>` + list.innerHTML;
    }
  </script>
</body>
</html>
