<!DOCTYPE html>
<html>
<head>
  <title>Yellow Hammer Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
    }
    .btn-primary {
      background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(234, 179, 8, 0.4);
    }
    .btn-secondary {
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }
    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .input-field {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }
    .input-field:focus {
      border-color: #eab308;
      outline: none;
      box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.2);
    }
  </style>
</head>
<body class="p-6">
  <!-- Header with Logo -->
  <div class="text-center mb-8">
    <img src="/LOGO.png" alt="Yellow Hammer" class="h-24 mx-auto mb-4">
    <h1 class="text-3xl text-yellow-500 font-bold tracking-wide">YELLOW HAMMER</h1>
    <p class="text-gray-400 mt-2">Roofing Contract Management</p>
  </div>
  
  <!-- Main Menu -->
  <div id="menu" class="max-w-md mx-auto space-y-4">
    <button onclick="uploadClick()" class="btn-primary w-full py-5 px-6 rounded-xl font-bold text-black text-lg flex items-center justify-center gap-3">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
      </svg>
      Upload Contract
    </button>
    
    <div class="grid grid-cols-2 gap-4">
      <button onclick="requestEstimate()" class="btn-secondary py-4 px-4 rounded-xl font-bold text-white flex items-center justify-center gap-2">
        <span>📧</span> Request Estimate
      </button>
      <button onclick="viewJobs()" class="bg-emerald-600 hover:bg-emerald-500 py-4 px-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-all">
        <span>📋</span> View Jobs
      </button>
    </div>
    
    <div class="grid grid-cols-2 gap-4">
      <button onclick="addEstimate()" class="bg-purple-600 hover:bg-purple-500 py-4 px-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-all">
        <span>📝</span> Add Estimate
      </button>
      <button onclick="addInstallDate()" class="bg-orange-600 hover:bg-orange-500 py-4 px-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-all">
        <span>📅</span> Add Install Date
      </button>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png" onchange="handleFile(this)" class="hidden">

  <!-- Confirm Data Card -->
  <div id="confirm" class="hidden max-w-md mx-auto mt-8">
    <div class="card rounded-2xl p-6">
      <h2 class="text-2xl text-yellow-500 font-bold mb-6 text-center">Confirm Data</h2>
      <div id="fields" class="space-y-4"></div>
      <div class="flex gap-4 mt-6">
        <button onclick="saveData()" class="btn-primary flex-1 py-3 px-6 rounded-xl font-bold text-black">Save</button>
        <button onclick="showMenu()" class="bg-red-600 hover:bg-red-500 flex-1 py-3 px-6 rounded-xl font-bold text-white transition-all">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div id="progress" class="hidden text-center mt-8">
    <div class="inline-flex items-center gap-3 card py-3 px-6 rounded-xl">
      <svg class="animate-spin h-5 w-5 text-yellow-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span class="text-yellow-500 font-medium">Processing...</span>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let data = {};

    function uploadClick() { 
      document.getElementById('fileInput').click(); 
    }
    
    async function handleFile(input) {
      if (!input.files[0]) return;
      
      const file = input.files[0];
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('progress').classList.remove('hidden');
      
      try {
        let imageBase64;
        
        if (file.type === 'application/pdf') {
          const images = await convertPdfToImages(file);
          imageBase64 = images.join('||PAGE||');
        } else {
          imageBase64 = await fileToBase64(file);
        }
        
        const response = await fetch(API + '/api/upload-json', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({file: imageBase64, isPdf: true, preview: true})
        });
        
        const result = await response.json();
        document.getElementById('progress').classList.add('hidden');
        
        if (result.success && result.previewData) {
          data = result.previewData;
          showConfirm(result.previewData);
        } else {
          alert('Error: ' + (result.error || 'Unknown error'));
          showMenu();
        }
      } catch (err) {
        alert('Error: ' + err.message);
        document.getElementById('progress').classList.add('hidden');
        showMenu();
      }
    }
    
    async function convertPdfToImages(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const images = [];
      
      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page = await pdf.getPage(pageNum);
        const viewport = page.getViewport({ scale: 2 });
        
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        await page.render({ canvasContext: context, viewport: viewport }).promise;
        const imageData = canvas.toDataURL('image/jpeg').split(',')[1];
        images.push(imageData);
      }
      
      return images;
    }
    
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function showConfirm(d) {
      document.getElementById('menu').classList.add('hidden');
      const fields = ['owner','address','phone','email','totalCost','toooP'];
      const labels = {'owner':'Owner','address':'Address','phone':'Phone','email':'Email','totalCost':'Total Cost','toooP':'T.O.O.P'};
      let html = fields.map(f => 
        `<div>
          <label class="text-gray-400 text-sm">${labels[f]}</label>
          <input id="${f}" value="${(d[f]||'')}" class="input-field w-full p-3 rounded-lg text-white">
        </div>`
      ).join('');
      document.getElementById('fields').innerHTML = html;
      document.getElementById('confirm').classList.remove('hidden');
    }

    function saveData() {
      const fields = ['owner','address','phone','email','totalCost','toooP'];
      fields.forEach(f => data[f] = document.getElementById(f).value);
      data.month = 'April';
      
      fetch(API + '/api/save-extracted', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      }).then(r => r.json()).then(result => {
        alert(result.success ? '✓ Saved!' : 'Error: ' + result.error);
        showMenu();
      }).catch(err => alert('Save error: ' + err.message));
    }

    function showMenu() {
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('confirm').classList.add('hidden');
      document.getElementById('progress').classList.add('hidden');
    }

    function requestEstimate() { alert('Request Estimate'); }
    function addEstimate() { alert('Add Estimate'); }
    function addInstallDate() { alert('Add Install Date'); }
    function viewJobs() { 
      fetch(API + '/api/jobs').then(r => r.json()).then(j => {
        alert('Jobs: ' + Object.keys(j).join(', '));
      }).catch(e => alert('Error: ' + e.message));
    }
  </script>
</body>
</html>
