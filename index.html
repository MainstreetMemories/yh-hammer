<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yellow Hammer Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    
    .btn-primary { 
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      transition: all 0.2s;
    }
    .btn-primary:active { transform: scale(0.98); }
    
    .btn-secondary { 
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      transition: all 0.2s;
    }
    .btn-secondary:active { transform: scale(0.98); }
    
    .logo-area {
      background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
      border-bottom: 3px solid #f59e0b;
    }
  </style>
</head>
<body class="bg-gray-900 min-h-screen">
  <!-- Logo Header -->
  <div class="logo-area py-6 px-4 text-center">
    <div class="inline-block">
      <!-- Logo Placeholder - Replace with actual logo image -->
      <div class="text-4xl font-black tracking-wider">
        <span class="text-yellow-500">YELLOW</span><span class="text-white">HAMMER</span>
      </div>
      <div class="text-yellow-500 text-xs font-bold tracking-[0.3em] mt-1">PROPERTIES, INC.</div>
    </div>
  </div>

  <div class="max-w-md mx-auto p-4">
    <div id="status" class="hidden mb-4 p-4 rounded-lg text-center font-semibold"></div>

    <!-- Main Menu -->
    <div id="menu" class="grid gap-4 mt-6">
      <!-- Upload Button -->
      <button onclick="document.getElementById('file-input').click()" 
        class="btn-primary w-full py-8 px-6 rounded-2xl text-white font-bold text-xl shadow-xl flex items-center justify-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0016.07 6H17a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <span>📸 Upload Contract</span>
      </button>
      <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFile(event)">
      
      <!-- Edit Records Button -->
      <button onclick="showJobs()" 
        class="btn-secondary w-full py-8 px-6 rounded-2xl text-white font-bold text-xl shadow-xl flex items-center justify-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <span>📋 View Jobs</span>
      </button>
    </div>

    <!-- Jobs List -->
    <div id="jobs" class="hidden">
      <button onclick="showMenu()" class="mb-4 text-yellow-500 font-semibold flex items-center gap-2">
        ← Back
      </button>
      <h2 class="text-white text-xl font-bold mb-4">📋 Job Records</h2>
      <div id="month-tabs" class="flex flex-wrap gap-2 mb-4"></div>
      <div id="jobs-list" class="space-y-3"></div>
    </div>

    <!-- Loading -->
    <div id="progress" class="hidden mt-6">
      <div class="bg-gray-800 rounded-xl p-6 text-center">
        <div class="animate-spin h-10 w-10 border-4 border-yellow-500 border-t-transparent rounded-full mx-auto mb-3"></div>
        <p class="text-yellow-500 font-semibold" id="progress-text">Processing...</p>
      </div>
    </div>

    <!-- Instructions -->
    <div class="mt-8 p-5 bg-gray-800 rounded-xl border-l-4 border-yellow-500">
      <h3 class="text-yellow-500 font-bold mb-2">📷 How to Use</h3>
      <p class="text-gray-400 text-sm leading-relaxed">
        1. Take a clear photo of the contract<br>
        2. Upload it using the button above<br>
        3. The AI will read all the details automatically<br>
        4. Job is saved to the spreadsheet!
      </p>
    </div>

    <!-- Recent -->
    <div class="mt-6">
      <h3 class="text-gray-500 text-xs font-bold uppercase tracking-wider mb-3">Recent Uploads</h3>
      <div id="recent-list" class="text-gray-500 text-sm italic">No uploads yet</div>
    </div>
  </div>

  <script>
    const API = window.location.origin;

    function showStatus(msg, err = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `mb-4 p-4 rounded-xl text-center font-semibold ${err ? 'bg-red-900/80 text-red-200' : 'bg-green-900/80 text-green-200'}`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 7000);
    }

    function showProgress(show, text = 'Processing...') {
      document.getElementById('progress').className = show ? 'mt-6' : 'hidden';
      document.getElementById('progress-text').textContent = text;
    }

    function showMenu() {
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('jobs').classList.add('hidden');
    }

    function showJobs() {
      showProgress(true, 'Loading...');
      fetch(API + '/api/jobs').then(r => r.json()).then(jobs => {
        const months = Object.keys(jobs);
        const current = months.includes('April') ? 'April' : months[0];
        document.getElementById('month-tabs').innerHTML = months.map(m => 
          `<button onclick="showMonth('${m}')" class="px-4 py-2 rounded-lg font-semibold text-sm ${m === current ? 'bg-yellow-500 text-black' : 'bg-gray-700 text-gray-300'}">${m}</button>`
        ).join('');
        showMonth(current);
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('jobs').classList.remove('hidden');
      }).finally(() => showProgress(false));
    }

    function showMonth(month) {
      fetch(API + '/api/jobs').then(r => r.json()).then(jobs => {
        const list = document.getElementById('jobs-list');
        const monthJobs = jobs[month] || [];
        list.innerHTML = monthJobs.length ? monthJobs.map(j => `
          <div class="bg-gray-800 p-4 rounded-xl">
            <div class="text-white font-bold">${j.owner || 'Unknown'}</div>
            <div class="text-gray-400 text-sm">${j.address || 'No address'}</div>
            <div class="text-yellow-500 font-bold mt-1">$${j.totalCost || '0'}</div>
          </div>
        `).join('') : '<p class="text-gray-500">No jobs this month</p>';
      });
    }

    async function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      showProgress(true, 'Reading contract...');
      
      try {
        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });

        showProgress(true, 'Extracting data...');

        const formData = new FormData();
        formData.append('file', base64);
        formData.append('mime', file.type || 'image/jpeg');

        const response = await fetch(API + '/api/upload', { method: 'POST', body: formData });
        const result = await response.json();

        if (response.ok) {
          showStatus('✓ Contract added to ' + result.month);
        } else {
          showStatus(result.error || 'Error uploading', true);
        }
      } catch (err) {
        showStatus('Error: ' + err.message, true);
      }

      showProgress(false);
      event.target.value = '';
    }
  </script>
</body>
</html>
