<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yellow Hammer Properties</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .btn-primary { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .btn-secondary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
  </style>
</head>
<body class="bg-gray-900 min-h-screen">
  <div class="max-w-md mx-auto p-4">
    <div class="text-center mb-8 pt-4">
      <h1 class="text-3xl font-bold text-amber-500">YELLOW HAMMER</h1>
      <p class="text-gray-400 text-sm">PROPERTIES, INC.</p>
    </div>

    <div id="status" class="hidden mb-4 p-3 rounded-lg text-center"></div>

    <div id="menu" class="grid gap-4">
      <button onclick="document.getElementById('file-input').click()" class="btn-primary w-full py-6 px-6 rounded-xl text-white font-semibold text-lg">
        Upload Contract
      </button>
      <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png" class="hidden" onchange="handleFile(event)">
      
      <button onclick="showJobs()" class="btn-secondary w-full py-6 px-6 rounded-xl text-white font-semibold text-lg">
        Edit Records
      </button>
    </div>

    <div id="jobs" class="hidden">
      <button onclick="showMenu()" class="mb-4 text-amber-500">← Back</button>
      <h2 class="text-white text-xl mb-4">Edit Records</h2>
      <div id="jobs-list"></div>
    </div>

    <div id="progress" class="hidden mt-4">
      <p class="text-amber-500 text-center" id="progress-text">Processing...</p>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const API = window.location.origin;

    function showStatus(msg, err) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = `mb-4 p-3 rounded-lg text-center ${err ? 'bg-red-900' : 'bg-green-900'} text-white`;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 6000);
    }

    function showProgress(show, text) {
      document.getElementById('progress').className = show ? 'mt-4' : 'hidden';
      document.getElementById('progress-text').textContent = text;
    }

    function showMenu() {
      document.getElementById('menu').classList.remove('hidden');
      document.getElementById('jobs').classList.add('hidden');
    }

    function showJobs() {
      document.getElementById('menu').classList.add('hidden');
      document.getElementById('jobs').classList.remove('hidden');
    }

    async function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      showProgress(true, 'Processing...');
      
      try {
        // Convert file to base64 image
        let base64, type;
        
        if (file.name.toLowerCase().endsWith('.pdf')) {
          // PDF -> convert to image
          const buffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
          const page = await pdf.getPage(1);
          const viewport = page.getViewport({ scale: 2.0 });
          
          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
          
          base64 = canvas.toDataURL('image/jpeg').split(',')[1];
          type = 'image/jpeg';
        } else {
          // Image -> just use it
          base64 = await new Promise(r => {
            const reader = new FileReader();
            reader.onload = () => r(reader.result.split(',')[1]);
            reader.readAsDataURL(file);
          });
          type = file.type || 'image/jpeg';
        }

        console.log('File converted, size:', base64.length);

        // Send as simple form data
        const formData = new FormData();
        formData.append('image', base64);
        formData.append('type', type);

        const response = await fetch(API + '/api/upload', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();
        console.log('Result:', result);

        if (response.ok) {
          showStatus('✓ Added to ' + result.month);
        } else {
          showStatus(result.error || 'Error', true);
        }
      } catch (err) {
        console.error(err);
        showStatus('Error: ' + err.message, true);
      }

      showProgress(false);
      event.target.value = '';
    }
  </script>
</body>
</html>
